<div class="card card-custom">
    <div class="card-body pb-0">
      <form
        [formGroup]="filterForm"
        class="form-horizontal"
        name="form"
        role="form"
      >
        <div class="row container form-group justify-content-center">
          <div class="col-md-2 col-sm-12">
            <label class="control-label">Date From:</label>
            <input
              (click)="dateFrom.toggle()"
              #dateFrom="ngbDatepicker"
              placeholder="dd-mm-yyyy"
              ngbDatepicker
              value="1980-08-26"
              formControlName="DateFrom"
              name="DateFrom"
              class="form-control mb-4"
              type="text"
              value=""
              [ngClass]="{
                invalid: filterForm.get('DateFrom').errors,
                'invalid-highlighted':
                  filterForm.get('DateFrom').errors && isSubmitted
              }"
              [maxDate]="maxDate"
            />
          </div>
          <div class="col-md-2 col-sm-12">
            <label class="control-label">Date To:</label>
            <input
              (click)="dateTo.toggle()"
              placeholder="dd-mm-yyyy"
              #dateTo="ngbDatepicker"
              ngbDatepicker
              formControlName="DateTo"
              class="form-control mb-4"
              name="DateTo"
              type="text"
              value=""
              [ngClass]="{
                invalid: filterForm.get('DateTo').errors,
                'invalid-highlighted':
                  filterForm.get('DateTo').errors && isSubmitted
              }"
              [maxDate]="maxDate"
            />
          </div>
  
          <div class="mt-8 col-md-3 col-sm-12">
            <div
              (click)="getReportData()"
              class="btn btn-primary"
              type="button"
            >
              Search
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
  
  <div class="card">
    <div class="card-body">
      <ngx-spinner
        class="spinner-warning"
        [name]="spinnerRefs.reportTable"
        bdColor="rgba(0,0,0,0.8)"
        size="medium"
        color="#fff"
        type="square-loader"
        [fullScreen]="false"
      >
        <p style="color: white">Loading...</p>
      </ngx-spinner>
      <div class="row justify-content-center">
        <div class="col-md-6 col-sm-12">
          <div class="input-group">
            <input
              type="text"
              placeholder="type to filter"
              class="form-control form-control-sm"
              [(ngModel)]="searchText"
              name="searchText"
            />
          </div>
        </div>
      </div>
      <div class="table-responsive table-container fixed-height-table">
        <table
          class="table table-hover compact table-bordered"
          style="width: 100%"
          cellpadding="0"
          cellspacing="0"
        >
          <thead class="sticky-header">
            <th>#</th>
            <th>Employe Name</th>
            <th>Perform Count</th>
            <th>Per X-Ray</th>
            <th>Total Share</th>
          </thead>
          <tbody>
            <tr class="text-center" *ngIf="ReportDataList.length < 1">
              <td colspan="100">No Record Found</td>
            </tr>
            <tr
              *ngFor="
                let data of ReportDataList
                  | filterByKey : searchText : ['EmployeName', 'PerformCount', 'PerXRay', 'TotalShare'];
                let i = index
              "
            >
              <td>{{ i + 1 }}</td>
              <td>{{ data.EmployeName || '--'}}</td>
              <td>{{ data.PerformCount || '--' }}</td>
              <td>{{ data.PerXRay || '--'}}</td>
              <td>{{ data.TotalShare || '--'}}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
