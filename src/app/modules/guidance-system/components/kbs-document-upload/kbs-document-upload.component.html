<div class="container-fluid.mt-3">
  <app-card [cardClass]="'tim-card tim-card-primary'">
    <div class="card-header">
      <div class="card-title">
        <h2 class="card-label">Upload Documents</h2>
      </div>
    </div>
    <div class="card-body">
      <div class="row">
        <div class="col-md-9 mt-7">
          <!-- Upload Section -->
          <div class="upload-section mb-4">
            <h5 class="mb-3">Upload File</h5>

            <!-- File input -->
            <div class="form-group mb-2">
              <app-visit-docs 
                [forFilterComp]="26" 
                [isLoadByDefault]="docDefault" 
                [allowRemove]="true" 
                [sectionHead]="'Attach'"
                [editing]="{insert:false,select: true, camera: true}" 
                (outputDocs)="getLoadedDocs($event)">
              </app-visit-docs>   
            </div>

            <!-- Document Title -->
            <div class="form-group mb-2">
              <input
                type="text"
                class="form-control"
                placeholder="Enter document title"
                [(ngModel)]="documentTitle"
              />
            </div>

            <!-- Category Dropdown -->
            <div class="form-group mb-2">
              <ng-select
                [items]="categories"
                bindLabel="CategoryName"
                bindValue="DKBSDocumentCategoryID"
                [(ngModel)]="selectedCategoryId"
                placeholder="Select category"
                [searchable]="true"
              ></ng-select>
            </div>

            <div class="d-flex gap-2 mt-3">
              <button
                type="button"
                class="btn btn-warning mr-2"
                (click)="validateDocument()"
                [disabled]="
                  !loadedDocuments?.length || !documentTitle || !selectedCategoryId
                "
              >
                Validate & Upload File
              </button>
              
              <!-- Clear Form Button -->
              <button
                type="button"
                class="btn btn-outline-secondary"
                (click)="clearUploadForm()"
                [disabled]="!loadedDocuments?.length && !documentTitle && !selectedCategoryId"
              >
                <i class="fa fa-times"></i> Clear
              </button>
            </div>
            
            <!-- Status Message -->
            <div class="mt-2" *ngIf="loadedDocuments?.length">
              <small class="text-success">
                <i class="fa fa-check"></i> {{ loadedDocuments.length }} file(s) ready for upload
              </small>
            </div>
          </div>
        </div>
        
        <div class="col-md-3 mt-4">
          <ngx-spinner
            class="spinner-info"
            bdColor="rgba(0,0,0,0.8)"
            [name]="spinnerRefs.searchTable"
            size="medium"
            color="#fff"
            type="square-loader"
            [fullScreen]="false"
          >
            <p style="color: white">Please wait...</p>
          </ngx-spinner>

          <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="section-title"><strong>Add Categories:</strong></span>
            <button
              class="btn btn-mini btn-outline-primary input-group-btn-custom"
              (click)="getKBSDocumentCategory()"
            >
              <i class="ti-reload"></i>
            </button>
          </div>

          <div class="table-responsive table-container fixed-height-table mt-4">
            <table class="table table-hover compact table-bordered">
              <thead class="sticky-header">
                <tr>
                  <th>Category's Name</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let cat of categories; let i = index">
                  <td width="85%">
                    <!-- Show input for new rows, text for existing rows -->
                    <input
                      *ngIf="isNewCategory(cat)"
                      type="text"
                      class="form-control form-control-sm"
                      [(ngModel)]="cat.CategoryName"
                      placeholder="Enter category name"
                      (blur)="validateCategoryName(cat)"
                    />
                    <span *ngIf="!isNewCategory(cat)">{{
                      cat.CategoryName
                    }}</span>
                  </td>
                  <td width="5%" class="text-center">
                    <button
                      class="btn btn-sm btn-outline-danger mt-3"
                      type="button"
                      [disabled]="disabledButton"
                      mwlConfirmationPopover
                      [popoverTitle]="'Please Confirm...!'"
                      [popoverMessage]="'Are you sure you want to delete?'"
                      [confirmText]="confirmationPopoverConfig.confirmText"
                      [cancelText]="confirmationPopoverConfig.cancelText"
                      [placement]="confirmationPopoverConfig.placements[0]"
                      (confirm)="
                        deleteDocumentCategory(cat.DKBSDocumentCategoryID)
                      "
                      (cancel)="
                        confirmationPopoverConfig.confirmPopoverCancel()
                      "
                      confirmButtonType="btn btn-sm btn-primary"
                      cancelButtonType="btn btn-sm btn-outline-secondary"
                      (click)="
                        confirmationPopoverConfig.confirmClicked = false;
                        confirmationPopoverConfig.cancelClicked = false
                      "
                      [appendToBody]="true"
                    >
                      <i class="fa fa-minus"></i>
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
            <!-- Debug info -->
            <div class="mt-2">
              <small class="text-muted">
                Total Categories: {{ totalCategoriesCount }}, Non-empty:
                {{ nonEmptyCategoriesCount }}
              </small>
            </div>
          </div>
          <div class="text-right mt-4">
            <button
              type="button"
              class="btn btn-sm btn-outline-success mr-2"
              (click)="addRow()"
            >
              <i class="fa fa-plus"></i> Add New Category
            </button>
            <button
              type="button"
              [disabled]="disabledButton"
              class="btn btn-sm btn-outline-primary"
              mwlConfirmationPopover
              [popoverTitle]="'Please Confirm...!'"
              [popoverMessage]="'Are you sure you want to save?'"
              [confirmText]="confirmationPopoverConfig.confirmText"
              [cancelText]="confirmationPopoverConfig.cancelText"
              [placement]="confirmationPopoverConfig.placements[0]"
              (confirm)="insertUpdateDKBSDocumentCategory()"
              (cancel)="confirmationPopoverConfig.confirmPopoverCancel()"
              confirmButtonType="btn btn-sm btn-primary"
              cancelButtonType="btn btn-sm btn-outline-secondary"
              (click)="
                confirmationPopoverConfig.confirmClicked = false;
                confirmationPopoverConfig.cancelClicked = false
              "
              [appendToBody]="true"
            >
              <i class="fa fa-save"></i> Save Categories
            </button>
          </div>
        </div>
      </div>
    </div>
  </app-card>
</div>
