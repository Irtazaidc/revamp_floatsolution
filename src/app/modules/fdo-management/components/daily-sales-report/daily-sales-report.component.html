<div class="card card-custom">
    <div class="card-body pb-0">
        <form [formGroup]="filterForm" class="form-horizontal" name="form" role="form">
            <div class="row container  form-group justify-content-center">
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-12">
                    <label class="control-label">Date From:</label>
                    <input (click)="dateFrom.toggle()" #dateFrom="ngbDatepicker" placeholder="dd-mm-yyyy" ngbDatepicker
                         value="1980-08-26" formControlName="dateFrom" name="dateFrom"
                        class="form-control mb-4" type="text" value="" [ngClass]="{'invalid': filterForm.get('dateFrom').errors , 'invalid-highlighted': filterForm.get('dateFrom').errors && isSubmitted }" [maxDate]="maxDate"/>
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-12">
                    <label class="control-label">Date To:</label>
                    <input (click)="dateTo.toggle()"  placeholder="dd-mm-yyyy" #dateTo="ngbDatepicker"  ngbDatepicker
                        formControlName="dateTo" class="form-control mb-4" name="dateTo" type="text" value=""
                        [ngClass]="{'invalid': filterForm.get('dateTo').errors , 'invalid-highlighted': filterForm.get('dateTo').errors && isSubmitted }" [maxDate]="maxDate" />
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-12">
                    <label class="control-label">Branch:</label>
                    
                        <div class="form-group">
                            <ng-select id="pat_branch" style="width: 100%;"  [ngClass]="{'invalid': filterForm.get('locID').errors, 'invalid-highlighted': filterForm.get('locID').errors && isSubmitted}" 
                                formControlName="locID" [items]="branchList" bindLabel="Title" [multiple]="false" 
                                [closeOnSelect]="true" 
                                bindValue="LocId" placeholder="--Select Branch--">

                                <ng-template ng-multi-label-tmp let-items="items" let-clear="clear">
                                    <div class="ng-value" *ngFor="let item of items | slice:0:2">
                                        <span class="ng-value-icon right" (click)="clear(item)" aria-hidden="true">×</span>
                                        <span class="ng-value-label"> {{item.Title}}</span>
                                    </div>
                                </ng-template>
                            </ng-select>
                          
                        </div> 
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-12">
                    <label class="control-label">Payment Method:</label>
                        <div class="form-group">
                           <ng-select style="width: 100%;" value=""  [items]="paymentModesList" bindLabel="Title"
                           placeholder="-Select Status-" bindValue="ModeId"  formControlName="ModeId" name="ModeId">
                           </ng-select>
                        </div>  
                </div>
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-12">
                    <label class="control-label">Patient Type:</label>
                        <div class="form-group">
                           <ng-select style="width: 100%;" value=""   [items]="patientTypeList" bindLabel="Title"
                           placeholder="-Select-" bindValue="TypeId"  formControlName="TypeId" name="TypeId">
                           </ng-select>
                        </div> 
                </div>
               
               
                <div class="mt-8 col-xl-2 col-lg-3 col-md-4 col-sm-12">
                    <button type="button" (click)="getDailySalesReportData()" class="btn btn-primary" type="button">Search</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body ">
        
            <ngx-spinner class="spinner-warning" [name]="spinnerRefs.delayreportTable"
                            bdColor="rgba(0,0,0,0.8)" size="medium" color="#fff" type="square-loader"
                            [fullScreen]="false">
                            <p style="color: white"> Loading... </p>
                          </ngx-spinner>
                          <div class="row justify-content-center">
                            <div class="col-md-6 col-sm-12">
                            <div class="input-group">
                                <input type="text" placeholder="type to filter" class="form-control form-control-sm" 
                                [(ngModel)]="searchText" name="searchText"/>
                                <button class="btn btn-mini btn-outline-primary input-group-btn-custom" (click)="getDailySalesReportData()"><i class="ti-reload"></i></button>
                            </div>
                            </div>
                        </div>              
            <div class="table-responsive table-container fixed-height-table"> 
                <table  class="table table-hover compact table-bordered" style="width: 100%; overflow: hidden;"
                cellpadding=0 cellspacing=0>
                <thead class="sticky-header">
                    <th>#</th>
                    <th>Receipt No</th>
                    <th>MR No</th>
                    <th>Name</th>
                    <th>Visit ID</th>
                    <th>Receiving Date</th>
                    <th>CreatedBy</th>
                    <!-- <th>Balance</th> -->
                    <th>Amount(Rs.{{TotalAmount}})</th>
                </thead>
                <tbody>
                    <tr class="text-center" *ngIf="!dailySalesReportDataList || dailySalesReportDataList === ''">
                        <td colspan="8">
                        <app-no-record-found></app-no-record-found>
                        </td>
                    </tr>
                    <tr *ngFor="let data of dailySalesReportDataList | filterByKey: searchText:['PatientName','VisitId','ReceiptNo','RegNo']; let i = index">
                        <td>{{i + 1}}</td>
                        <td>{{data.ReceiptNo}}</td>
                        <td>{{data.RegNo}}</td>
                        <td>{{data.Name}}</td>
                        <td>{{data.VisitId}}</td>
                        <td>{{data.RecDate | date:"dd MMM, yyyy, h:mm a"}}</td>
                        <td>{{data.CreatedUser || '--'}}</td>
                        <!-- <td>{{data.Balance}}</td> -->
                        <td>{{data.NetAmount}}</td>
                    </tr>
                </tbody>
            </table>
            </div>
    </div>
</div>
