<div class="card card-custom">
  <div class="card-body pb-0">
    <form
      [formGroup]="filterForm"
      class="form-horizontal"
      name="form"
      role="form"
    >
      <div class="row container justify-content-center">
        <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12">
          <label class="control-label">Date From:</label>
          <input
            (click)="dateFrom.toggle()"
            #dateFrom="ngbDatepicker"
            placeholder="dd-mm-yyyy"
            ngbDatepicker
            value="1980-08-26"
            formControlName="dateFrom"
            name="dateFrom"
            class="form-control mb-4"
            type="text"
            value=""
            [ngClass]="{
              invalid: filterForm.get('dateFrom').errors,
              'invalid-highlighted':
                filterForm.get('dateFrom').errors && isSubmitted
            }"
            [maxDate]="maxDate"
          />
        </div>
        <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12">
          <label class="control-label">Date To:</label>
          <input
            (click)="dateTo.toggle()"
            placeholder="dd-mm-yyyy"
            #dateTo="ngbDatepicker"
            ngbDatepicker
            formControlName="dateTo"
            class="form-control mb-4"
            name="dateTo"
            type="text"
            value=""
            [ngClass]="{
              invalid: filterForm.get('dateTo').errors,
              'invalid-highlighted':
                filterForm.get('dateTo').errors && isSubmitted
            }"
            [maxDate]="maxDate"
          />
        </div>
        <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12">
          <label class="control-label">Branch:</label>
          <div class="form-group">
            <ng-select
              id="pat_branch"
              style="width: 100%"
              [ngClass]="{
                invalid: filterForm.get('locID').errors,
                'invalid-highlighted':
                  filterForm.get('locID').errors && isSubmitted
              }"
              formControlName="locID"
              [items]="branchList"
              bindLabel="Title"
              [multiple]="true"
              [closeOnSelect]="false"
              bindValue="LocId"
              placeholder="--Select Branch--"
            >
              <ng-template
                ng-multi-label-tmp
                let-items="items"
                let-clear="clear"
              >
                <div
                  class="ng-value"
                  *ngFor="let item of items | slice : 0 : 2"
                >
                  <span
                    class="ng-value-icon right"
                    (click)="clear(item)"
                    aria-hidden="true"
                    >×</span
                  >
                  <span class="ng-value-label"> {{ item.Title }}</span>
                </div>
                <div class="ng-value" *ngIf="items.length > 2">
                  <span class="ng-value-label"
                    >{{ items.length - 2 }} more...</span
                  >
                </div>
              </ng-template>
              <ng-template ng-header-tmp>
                <button
                  (click)="onSelectAllBranches()"
                  class="btn btn-mini btn-outline-primary"
                  type="button"
                >
                  <i class="ti-check"></i>Select all
                </button>
                <button
                  (click)="onUnselectAllBranches()"
                  class="btn btn-mini btn-outline-primary m-l-10 pull-right"
                  type="button"
                >
                  <i class="ti-close"></i>Unselect all
                </button>
              </ng-template>
            </ng-select>
          </div>
        </div>
        <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12">
          <label class="control-label">Patient Type:</label>
          <div class="form-group">
            <ng-select
              class="mt-1 mr-1"
              style="width: 100%"
              value=""
              [items]="patientTypeList"
              bindLabel="Title"
              placeholder="-Select-"
              bindValue="TypeId"
              formControlName="TypeId"
              name="TypeId"
            >
            </ng-select>
          </div>
        </div>
        <div class="col-xl-2 col-lg-3 col-md-6 col-sm-12">
          <div class="form-group">
            <label for="labDeptID">Department:</label>
            <select
              class="form-control"
              name="labDeptID"
              placeholder="--Select Department--"
              [(ngModel)]="labDeptID"
              [ngModelOptions]="{ standalone: true }"
              (ngModelChange)="getSubSection()"
            >
              <option value="-1">-Select All-</option>
              <option value="1">Lab</option>
              <option value="2">Radiology</option>
            </select>
          </div>
        </div>
        <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12">
          <div class="form-group">
            <label class="control-label">Section:</label>
            <ng-select
              style="width: 100%"
              class="mt-1 mr-1"
              [items]="subSectionList"
              bindLabel="SubSectionTitle"
              placeholder="-Select Section-"
              bindValue="SubSectionId"
              formControlName="SectionId"
            >
            </ng-select>
          </div>
        </div>
        <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12">
          <div class="form-group">
            <label class="">Tests:</label>
            <ng-select
              style="width: 100%"
              class="mt-1 mr-1"
              placeholder="-Select Tests-"
              [items]="testList"
              bindLabel="TestCompleteName"
              bindValue="TPId"
              formControlName="TPId"
            >
              <ng-template
                ng-multi-label-tmp
                let-items="items"
                let-clear="clear"
              >
                <div
                  class="ng-value"
                  *ngFor="let item of items | slice : 0 : 2"
                >
                  <span
                    class="ng-value-icon right"
                    (click)="clear(item)"
                    aria-hidden="true"
                    >×</span
                  >
                  <span>{{ item.TestCompleteName }}</span>
                </div>
              </ng-template>
            </ng-select>
          </div>
        </div>

        <div class="mt-8 col-xl-2 col-lg-3 col-md-4 col-sm-12">
          <button
            type="button"
            (click)="getTestReportData()"
            class="btn btn-primary"
            type="button"
          >
            Search
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <ngx-spinner
      class="spinner-warning"
      [name]="spinnerRefs.delayreportTable"
      bdColor="rgba(0,0,0,0.8)"
      size="medium"
      color="#fff"
      type="square-loader"
      [fullScreen]="false"
    >
      <p style="color: white">Loading...</p>
    </ngx-spinner>
    <div class="row justify-content-center">
      <div class="col-md-6 col-sm-12">
        <div class="input-group">
          <input
            type="text"
            placeholder="type to filter"
            class="form-control form-control-sm"
            [(ngModel)]="searchText"
            (keyup)="filterResults()"
            name="searchText"
          />
          <button
            class="btn btn-mini btn-outline-primary input-group-btn-custom"
            (click)="getTestReportData()"
          >
            <i class="ti-reload"></i>
          </button>
        </div>
      </div>
    </div>
    <div class="table-responsive table-container fixed-height-table">
      <table
        class="table table-hover compact table-bordered"
        style="width: 100%; overflow: hidden"
        cellpadding="0"
        cellspacing="0"
      >
        <thead>
          <th>Section</th>
          <th>Test Name</th>
          <th>Test Count</th>
          <th>Revenue</th>
          <th>Reg Price</th>
          <!-- <th>Delivery Date</th> -->
        </thead>
        <tbody>
          <tr class="text-center" *ngIf="!testCountList || testCountList == ''">
            <td colspan="7">
              <app-no-record-found></app-no-record-found>
            </td>
          </tr>
          <tr
            *ngFor="
              let data of pagination.paginatedSearchResults;
              let i = index
            "
          >
            <td>{{ data.SubSectionTitle || "-" }}</td>
            <td>{{ data.TestName || "-" }}</td>
            <td>{{ data.TestCount || "-" }}</td>
            <td>{{ data.Revenue || "-" }}</td>
            <td>{{ data.RegPrice || "-" }}</td>
            <!-- <td>{{data.DeliveryDate | date:"dd MMM, yyyy, h:mm a"}}</td> -->
          </tr>
        </tbody>
      </table>
    </div>
    <div class="row" *ngIf="pagination.paginatedSearchResults.length">
      <div class="col-md-6 col-sm-12">
        <ngb-pagination
          [collectionSize]="pagination.collectionSize"
          [(page)]="pagination.page"
          [pageSize]="pagination.pageSize"
          [boundaryLinks]="true"
          [maxSize]="5"
          [rotate]="true"
          (pageChange)="refreshPagination()"
        >
        </ngb-pagination>
      </div>
      <div class="col-md-6 col-sm-12">
        <select
          class="custom-select pull-right"
          style="width: auto"
          [(ngModel)]="pagination.pageSize"
          (ngModelChange)="refreshPagination()"
        >
          <option [ngValue]="5">5 items per page</option>
          <option [ngValue]="10">10 items per page</option>
          <option [ngValue]="20">20 items per page</option>
          <option [ngValue]="50">50 items per page</option>
          <option [ngValue]="100">100 items per page</option>
        </select>
      </div>
    </div>
  </div>
</div>
