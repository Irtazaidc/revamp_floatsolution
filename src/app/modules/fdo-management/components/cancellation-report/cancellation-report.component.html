<div class="card card-custom">
  <div class="card-body pb-0">
    <form
      [formGroup]="cancellationReportForm"
      class="form-horizontal"
      name="form"
      role="form"
      (ngSubmit)="getCancellationReport()"

    >
      <div class="row container form-group justify-content-center">
        <!-- Date-from field -->

        <div class="col-md-4 col-lg-3 col-xl-2 col-sm-12 col-12">
          <label class="control-label">Date From:</label>
          <input
            (click)="dateFrom.toggle()"
            #dateFrom="ngbDatepicker"
            placeholder="dd-mm-yyyy"
            ngbDatepicker
            value="1980-08-26"
            formControlName="dateFrom"
            name="dateFrom"
            class="form-control mb-4"
            type="text"
            value=""
            [ngClass]="{
              invalid: cancellationReportForm.get('dateFrom').errors,
              'invalid-highlighted':
                cancellationReportForm.get('dateFrom').errors && isSubmitted
            }"
            [maxDate]="maxDate"
          />
        </div>

        <!-- Date-to field -->

        <div class="col-md-4 col-lg-3 col-xl-2 col-sm-12 col-12">
          <label class="control-label">Date To:</label>
          <input
            (click)="dateTo.toggle()"
            placeholder="dd-mm-yyyy"
            #dateTo="ngbDatepicker"
            ngbDatepicker
            formControlName="dateTo"
            class="form-control mb-4"
            name="dateTo"
            type="text"
            value=""
            [ngClass]="{
              invalid: cancellationReportForm.get('dateTo').errors,
              'invalid-highlighted':
                cancellationReportForm.get('dateTo').errors && isSubmitted
            }"
            [maxDate]="maxDate"
          />
        </div>

        <!-- Branch field -->

        <div class="col-md-4 col-lg-3 col-xl-2 col-sm-12 col-12">
          <label class="control-label">Branch:</label>

          <div class="form-group">
            <ng-select
              id="pat_branch"
              style="width: 100%"
              [ngClass]="{
                invalid: cancellationReportForm.get('locID').errors,
                'invalid-highlighted':
                  cancellationReportForm.get('locID').errors && isSubmitted
              }"
              formControlName="locID"
              [items]="branchList"
              bindLabel="Title"
              [multiple]="true"
              [closeOnSelect]="false"
              bindValue="LocId"
              placeholder="--Select Branch--"
            >
              <ng-template
                ng-multi-label-tmp
                let-items="items"
                let-clear="clear"
              >
                <div
                  class="ng-value"
                  *ngFor="let item of items | slice : 0 : 2"
                >
                  <span
                    class="ng-value-icon right"
                    (click)="clear(item)"
                    aria-hidden="true"
                    >×</span
                  >
                  <span class="ng-value-label"> {{ item.Title }}</span>
                </div>
                <div class="ng-value" *ngIf="items.length > 2">
                  <span class="ng-value-label"
                    >{{ items.length - 2 }} more...</span
                  >
                </div>
              </ng-template>
              <ng-template ng-header-tmp>
                <button
                  (click)="onSelectAllBranches()"
                  class="btn btn-mini btn-outline-primary"
                  type="button"
                >
                  <i class="ti-check"></i>Select all
                </button>
                <button
                  (click)="onUnselectAllBranches()"
                  class="btn btn-mini btn-outline-primary m-l-10 pull-right"
                  type="button"
                >
                  <i class="ti-close"></i>Unselect all
                </button>
              </ng-template>
            </ng-select>
          </div>
        </div>

        <!-- Patient-type field -->

        <div class="col-md-4 col-lg-3 col-xl-2 col-sm-12 col-12">
          <label class="control-label">Patient Type:</label>
          <div class="form-group">
            <ng-select
              style="width: 100%"
              value=""
              [items]="patientTypeList"
              bindLabel="Title"
              placeholder="-Select Patient Type-"
              bindValue="TypeId"
              formControlName="patientType"
              name="TypeId"
            >
            </ng-select>
          </div>
        </div>

        <!-- Cancellation-type field -->

        <div class="col-md-4 col-lg-3 col-xl-2 col-sm-12 col-12">
          <label class="control-label">Cancellation Type:</label>
          <div class="form-group">
            <ng-select
              style="width: 100%"
              value=""
              [items]="cancellationTypes"
              bindLabel="label"
              placeholder="-Select Patient Type-"
              bindValue="value"
              formControlName="cancellationType"
              name="cancellationType"
            >
            </ng-select>
          </div>
        </div>

        <!-- Search button -->

        <div class="mt-8 col-md-4 col-lg-3 col-xl-2 col-sm-12 col-12">
          <div
            (click)="getCancellationReport()"
            class="btn btn-primary"
            type="button"
          >
            Search
          </div>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <!-- Excel-download field -->

    <ngx-spinner
      class="spinner-warning"
      [name]="spinnerRefs.cancellationreportTable"
      bdColor="rgba(0,0,0,0.8)"
      size="medium"
      color="#fff"
      type="square-loader"
      [fullScreen]="false"
    >
      <p style="color: white">Loading...</p>
    </ngx-spinner>
    <div class="row justify-content-center">
      <div class="col-md-6 col-sm-12">
        <div class="input-group">
          <input
            type="text"
            placeholder="type to filter"
            class="form-control form-control-sm"
            [(ngModel)]="searchText"
            name="searchText"
          />
          <button
            class="btn btn-mini btn-outline-primary input-group-btn-custom"
            (click)="getCancellationReport()"
          >
            <i class="ti-reload"></i>
          </button>
          <button
            class="btn btn-mini btn-outline-primary input-group-btn-custom ml-1"
            ngbTooltip="Export To Excel"
            (click)="exportAsExcel()"
          >
            <i class="fa fa-file-excel"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Table-Section -->

    <div class="table-responsive table-container fixed-height-table">
      <table
        class="table table-hover compact table-bordered"
        style="width: 100%; min-height: 200px"
        cellpadding="0"
        cellspacing="0"
      >
        <thead class="sticky-header">
          <th>#</th>
          <th>Test Code</th>
          <th>Test Name</th>
          <th>Cancelled on</th>
          <th>Remarks</th>
          <th>Cancelled Amount</th>
        </thead>
        <tbody *ngIf="cancellationReportDataList.length > 0; else noRecord">
          <tr
            *ngFor="
              let data of cancellationReportDataList
              | filterByKey : searchText : ['TestCode', 'TestCode'];
              let i = index
            "
          >
            <td>{{ i + 1 }}</td>
            <td>{{ data.TestCode }}</td>
            <td>{{ data.TestName }}</td>
            <td>{{ data.ChangedOn }}</td>
            <td>{{ data.Remarks }}</td>
            <td>{{ data.CancelledAmount }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  
<ng-template #noRecord>
    <div
      class="no-record-message"
      style="
        text-align: center;
        padding: 1rem;
        position: absolute;
        width: 100%;
        top: 50%;
        transform: translateY(-50%);
      "
    >
      <strong>No Record Found</strong>
    </div>
  </ng-template>
</div>
