<div class="card card-custom">
    <div class="card-header">
        <div class="card-title">
            <span class="card-icon">
                <i class="fas fa-search text-primary"></i>
            </span>
            <h3 class="card-label">
                Doctor Prescription Configuration
                <!-- <small>Search Doctor Prescription Configuration</small> -->
            </h3>
        </div>       
    </div>
    <div class="card-body pb-0">
        <form [formGroup]="medicForm" class="form-horizontal" name="form" role="form">
            <div class="row form-group justify-content-center">
                <div class="col-md-3 col-lg-3 col-sm-12">
                    <label class="control-label">Date From:</label>
                    <input (click)="dateFrom.toggle()" #dateFrom="ngbDatepicker" placeholder="dd-mm-yyyy" ngbDatepicker
                         value="1980-08-26" formControlName="dateFrom" name="dateFrom"
                        class="form-control mb-4" type="text" value="" [ngClass]="{'invalid': medicForm.get('dateFrom').errors , 'invalid-highlighted': medicForm.get('dateFrom').errors && isSubmitted }" [maxDate]="maxDate"/>
                </div>
                <div class="col-md-3 col-lg-3 col-sm-12">
                    <label class="control-label">Date To:</label>
                    <input (click)="dateTo.toggle()"  placeholder="dd-mm-yyyy" #dateTo="ngbDatepicker"  ngbDatepicker
                        formControlName="dateTo" class="form-control mb-4" name="dateTo" type="text" value=""
                        [ngClass]="{'invalid': medicForm.get('dateTo').errors , 'invalid-highlighted': medicForm.get('dateTo').errors && isSubmitted }" [maxDate]="maxDate" />
                </div>
                <div class="col-md-3 col-lg-3 col-sm-12">
                    <div class="form-row">
                      <label for="StatusId" class="control-label">Dotcor:</label>
                      <select class="form-control" formControlName="radID"   >
                        <option [value]="''">--Select Panel--</option>
                        <option *ngFor="let b of radoiologistList" [value]="b.EmpId">{{b.FullName}}</option>
                    </select>
                      <!-- <ng-select style="width: 100%" class="mt-1" [items]="radoiologistList" bindLabel="FullName"
                        placeholder="-Select Doctor-" bindValue="EmpId" formControlName="radID"
                        [ngClass]="{'invalid': medicForm.get('radID').errors , 'invalid-highlighted': medicForm.get('radID').errors && isSubmitted }">
                        <ng-template ng-multi-label-tmp let-items="items" let-clear="clear">
                          <div class="ng-value" *ngFor="let item of items | slice : 0 : 2">
                            <span class="ng-value-icon right" (click)="clear(item)" aria-hidden="true">×</span>
                            <span class="ng-value-label">
                              {{ item.FullName }}-{{ item.EmpId }} </span>
                          </div>
                        </ng-template>
                      </ng-select> -->
                    </div>
                  </div>
                <div class="mt-8 col-md-2 col-lg-2 col-sm-12">
                    <div (click)="getDoctorPrescRpt()" class="btn btn-primary" type="button">Search</div>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body">
            <ngx-spinner class="spinner-warning" [name]="spinnerRefs.doctorPresTable"
                            bdColor="rgba(0,0,0,0.8)" size="medium" color="#fff" type="square-loader"
                            [fullScreen]="false">
                            <p style="color: white"> Loading... </p>
                          </ngx-spinner>
            <div class="row justify-content-center">
                <div class="col-md-6 col-sm-12">
                <div class="input-group">
                    <input type="text" placeholder="type to filter" class="form-control form-control-sm" 
                    [(ngModel)]="searchText" name="searchText"/>
                    <button class="btn btn-mini btn-outline-primary input-group-btn-custom" (click)="getDoctorPrescRpt()"><i class="ti-reload"></i></button>
                    
                </div>
                </div>
            </div>
            <div class="table-responsive table-container fixed-height-table"> 
                <table *ngIf="dotcorPrescriptionList" class="table table-hover compact table-bordered" style="width: 100%;"
                cellpadding=0 cellspacing=0>
                <thead class="sticky-header">
                    <th width="5%">#</th>
                    <th width="10%">Doctor Name</th>
                    <th width="79%">Doctor Prescription</th>
                    <th width="6%">Action</th>
                </thead>
                <tbody>
                    <tr class="text-center" *ngIf="!dotcorPrescriptionList">
                        <td colspan="100">No Record Found</td>
                    </tr>
                    <tr *ngFor="let data of dotcorPrescriptionList | filterByKey: searchText:['DoctorName']; let i = index">
                        <td>{{i + 1}}</td>
                        <td>{{data.DoctorName || '-'}}</td>
                        <td>{{data.PrescriptionOCR}}</td>
                        <td>
                            <button class="btn btn-primary btn-sm"
                                        (click)="viewDocPres(data.DoctorPrescriptionID)">
                                        <i class="flaticon2-image-file" aria-hidden="true"></i> View</button>
                        </td>

                        <!-- <td>{{data.registrationdate | date:"dd MMM, yyyy, h:mm a"}}</td> -->
                    </tr>
                </tbody>
            </table>
            </div>
    </div>
</div>

<ng-template #showDocuments let-showDocuments>
    <div class="modal-header" style="display: block !important; padding: 1rem 1.75rem;">
        <div class="row">
            <div class="col-12">
                <h4 class="card-title">
                    Doctor Prescriptions 
                </h4>
            </div>
        </div>
    </div>
    <div class="modal-body">
        <ngx-spinner class="spinner-warning" [name]="spinnerRefs.doctorPres"
                            bdColor="rgba(0,0,0,0.8)" size="medium" color="#fff" type="square-loader"
                            [fullScreen]="false">
                            <p style="color: white"> Loading... </p>
                          </ngx-spinner>
        <div class="row">
            <div class="col-12">
                <div class="docs-area mt-2">
                    <!-- <app-visit-docs  [module]="Doctor Prescription"
                        [allowRemove]="false" 
                        [editing]="{insert:false,select: false, camera: false}" [sectionHead]="'Attached'"
                        [inputDocs]="OCRImg">
                    </app-visit-docs> -->
                    <img class="prescription-img" [src]="OCRImg || defaultPatientPic"
                                    alt="Prescription Img" />
                </div>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-outline-info" data-dismiss="modal"
            (click)="showDocuments.close()">
            <i class="fa fa-times-circle"></i>Close
        </button>
    </div>
</ng-template>
