<div class="card card-custom">
    <div class="card-header">
        <div class="card-title">
            <span class="card-icon">
                <i class="fas fa-search text-primary"></i>
            </span>
            <h3 class="card-label">
                Annual Medicals
                <small>Search Annual Medicals</small>
            </h3>
        </div>       
    </div>
    <div class="card-body pb-0">
        <form [formGroup]="medicForm" class="form-horizontal" name="form" role="form">
            <div class="row form-group justify-content-center">
                <div class="col-md-2 col-sm-12">
                    <label class="control-label">Date From:</label>
                    <input (click)="dateFrom.toggle()" #dateFrom="ngbDatepicker" placeholder="dd-mm-yyyy" ngbDatepicker
                         value="1980-08-26" formControlName="dateFrom" name="dateFrom"
                        class="form-control mb-4" type="text" value="" [ngClass]="{'invalid': medicForm.get('dateFrom').errors , 'invalid-highlighted': medicForm.get('dateFrom').errors && isSubmitted }" [maxDate]="maxDate"/>
                </div>
                <div class="col-md-2 col-lg-2 col-sm-12">
                    <label class="control-label">Date To:</label>
                    <input (click)="dateTo.toggle()"  placeholder="dd-mm-yyyy" #dateTo="ngbDatepicker"  ngbDatepicker
                        formControlName="dateTo" class="form-control mb-4" name="dateTo" type="text" value=""
                        [ngClass]="{'invalid': medicForm.get('dateTo').errors , 'invalid-highlighted': medicForm.get('dateTo').errors && isSubmitted }" [maxDate]="maxDate" />
                </div>
                <div class="col-md-2 col-lg-2 col-sm-12">
                    <label class="control-label">Panel:</label>      
                        <div class="form-group">
                            <select class="form-control" formControlName="panelId"  [ngClass]="{'invalid': medicForm.get('panelId').errors, 'invalid-highlighted': medicForm.get('panelId').errors && isSubmitted}" (change)="getTestProfileList()">
                                <option [value]="''">--Select Panel--</option>
                                <option *ngFor="let b of panelList1" [value]="b.PanelId">{{b.CodeName}}</option>
                            </select>
                            <!-- <ng-select [items]="panelList" bindLabel="CodeName" bindValue="PanelId"
                                 placeholder="--select--" name="panel"
                                 formControlName="panelId">
                            </ng-select>  -->
                        </div> 
                </div>
                <div class="col-md-2 col-lg-2 col-sm-12">
                    <label class="control-label">Package:</label>      
                        <div class="form-group">
                            <select class="form-control" formControlName="packageId" >
                                <option [value]="''">--Select Package--</option>
                                <option *ngFor="let b of TestProfileList1" [value]="b.TPId">{{b.TPName}}</option>
                            </select>
                            
                        </div> 
                </div>
                <div class="mt-8 col-md-2 col-lg-2 col-sm-12">
                    <div (click)="getAnnualMedicalrpt()" class="btn btn-primary" type="button">Search</div>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body">
            <ngx-spinner class="spinner-warning" [name]="spinnerRefs.annualmedTable"
                            bdColor="rgba(0,0,0,0.8)" size="medium" color="#fff" type="square-loader"
                            [fullScreen]="false">
                            <p style="color: white"> Loading... </p>
                          </ngx-spinner>
            <div class="row justify-content-center">
                <div class="col-md-6 col-sm-12">
                <div class="input-group">
                    <input type="text" placeholder="type to filter" class="form-control form-control-sm" 
                    [(ngModel)]="searchText" name="searchText"/>
                    <button class="btn btn-mini btn-outline-primary input-group-btn-custom" (click)="getAnnualMedicalrpt()"><i class="ti-reload"></i></button>
                    <button class="btn btn-mini btn-outline-primary input-group-btn-custom ml-1" ngbTooltip="Export To Excel" (click)="exportAsExcel()"><i class="fa fa-file-excel"></i></button>
                </div>
                </div>
            </div>
            <div class="table-responsive table-container fixed-height-table"> 
                <table *ngIf="annualMedicalList" class="table table-hover compact table-bordered" style="width: 100%;"
                cellpadding=0 cellspacing=0>
                <thead class="sticky-header">
                    <tr>
                        <ng-container *ngFor="let header of _object.keys(annualMedicalList[0]); let i = index ">
                          <ng-container >
                            <th>{{header}} </th>
                          </ng-container>
                        </ng-container>
                      </tr>
                </thead>
                <tbody>
                    <tr class="text-center" *ngIf="!annualMedicalList">
                        <td colspan="100">No Record Found</td>
                    </tr>
                    <tr *ngFor="let row of annualMedicalList | filterByKey: searchText:['PatientName', 'VisitID', 'cell']; let i = index ">
                        <ng-container *ngFor="let objKey of _object.keys(row); let j = index">
                          <td >{{ row[objKey] || 0 }} </td>
                        </ng-container>
                    </tr>
                </tbody>
            </table>
            </div>
    </div>
</div>
