    <div class="card">
      <div class="container mt-2">
        <div class="row mb-5 mt-4">
          <div class="col-md-12 mb-2">
            <div class="card-header">
                <div class="card-title">
                    <div *ngIf="showResetForm" class="row">
                        <div class="col-xs-12 col-sm-12 col-md-6 col-lg-6 col-xl-6">
                            <h4 class="card-label"><span *ngIf="! loggedInUserID">Reset</span> <span
                                    *ngIf="loggedInUserID">Change</span> Password</h4>
                        </div>
                        <div class="col-xs-12 col-sm-12 col-md-6 col-lg-6 col-xl-6">
                            <a *ngIf="! loggedInUserID" id="signinlink" class="text-right pull-right link-sign-in"
                                [routerLink]="['/auth/login']"><i class="fa fa-arrow-left" aria-hidden="true"></i>&nbsp;
                                Sign In</a>
                        </div>
                    </div>
                    <div *ngIf="!showResetForm" class="row">
                        <div class="col-lg-6">
                            <h6 class="card-label">This Reset Password Link Is Expired</h6>
                        </div>
                        <div class="col-lg-6">
                            <a *ngIf="! loggedInUserID" id="signinlink" class="text-right pull-right link-sign-in"
                                [routerLink]="['/auth/login/forgot-password']" forgotpassword><i class="fa fa-arrow-left"
                                    aria-hidden="true"></i>&nbsp; Forgot Password?
                                In</a>
                        </div>
                    </div>
                </div>
            </div>
    
            <form *ngIf="showResetForm" #resetFormData="ngForm" class="form-horizontal" role="form"
                (ngSubmit)="resetPassword()" id="resetForm">
                <!-- [PasswordMustMatch]="['Password', 'confrimpassword']" -->
                <div *ngIf="showOldPassword" class="form-group">
                    <label for="password" class="col-md-9 control-label">Old Password</label>
                    <div class="col-md-12">
                        <input [ngClass]="{ 'invalid-highlighted': resetFormData.submitted && OldPassword.invalid }"
                            #password="ngModel" required [(ngModel)]="OldPassword" name="OldPassword"
                            class="form-control" id="txtOlsPassword" type="password" />
                    </div>
                </div>
                <div class="form-group">
                    <label for="password" class="col-md-9 control-label">New Password</label>
                    <div class="col-md-12">
                        <input [ngClass]="{ 'invalid': !Password, 'invalid-highlighted': !Password  && isSubmitted }"
                            #password="ngModel"  required [(ngModel)]="Password" name="Password" class="form-control"
                            id="txtPassword" type="password" />
                    </div>
                </div>
                <div class="form-group">
                    <label for="password" class="col-md-9 control-label">Confirm Password</label>
                    <div class="col-md-12">
                        <input [ngClass]="{'invalid': !ConfrimPassword, 'invalid-highlighted': !ConfrimPassword && isSubmitted }"
                            #confirmpassword="ngModel" required [(ngModel)]="ConfrimPassword" name="confrimpassword"
                            class="form-control" (input)="validatePasswords()" id="confirmTxtPassword" type="password" />
                            <span *ngIf="passwordMatchError" class="text-danger">{{ passwordMatchError }}</span>
                    </div>
                </div>
                <div class="form-group">
                    <div class="row">
                        <div class="col-md-9">
                            <button id="btn-reset" type="submit" class="btn btn-info ml-3"
                                [disabled]="isDisabled"><i class="icon-hand-right"></i>
                                Reset Password 
                            </button>
                        </div>
                    </div>
                </div>
            </form>
           
          </div>
        </div>
      </div>
    </div>
