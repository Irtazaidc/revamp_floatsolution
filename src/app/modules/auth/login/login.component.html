<!--begin::Signin-->

<div *ngIf="IsAuthenticated" class="login-form login-signin text-center">

  <!--begin::Form-->
  <form class="form" [formGroup]="loginForm" novalidate="novalidate" id="kt_login_signin_form" (ngSubmit)="submit()">
    <!--begin::Login Header-->
    <div class="d-flex flex-center mb-10">
      <a href="#">
        <img src="assets/media/logos/brand/metacube-splashlogo.png" class="max-h-95px" alt="" />
      </a>
    </div>
    <!--end::Login Header-->
    <!--begin::Title-->
    <div class="mb-7">
      <!-- pb-13 pt-lg-0 pt-5 -->
      <h3 class="">
        Welcome to MetaCubes
      </h3>
      <span>Powered by IDC</span>
      <!-- <span class="text-muted font-weight-bold font-size-h4"
        >New Here?
        <a
          routerLink="/auth/registration"
          id="kt_login_signup"
          class="text-primary font-weight-bolder"
          >{{ "AUTH.GENERAL.SIGNUP_BUTTON" | translate }}</a
        >
      </span> -->
    </div>
    <!--end::Title-->

    <!-- begin::Alert info-->
    <!-- <ng-container *ngIf="!hasError">
      <div class="mb-10 alert alert-custom alert-light-info alert-dismissible">
        <div class="alert-text">
          Use account <strong>{{ defaultAuth.username }}</strong> and password
          <strong>{{ defaultAuth.password }}</strong> to continue.
        </div>
      </div>
    </ng-container> -->
    <!-- end::Alert info-->

    <!-- begin::Alert error-->
    <ng-container *ngIf="hasError">
      <div class="mb-10 alert alert-custom alert-light-danger alert-dismissible">
        <div class="alert-text">The login details are incorrect</div>
      </div>
    </ng-container>
    <!-- end::Alert error-->

    <!--begin::Form group-->
    <div class="form-group">

      <!-- <label class="font-size-h6 font-weight-bolder text-dark">Username</label> -->
      <input class="form-control form-control-solid h-auto py-7 px-6 rounded-lg" type="text" placeholder="Username"
        name="username" formControlName="username" autocomplete="off"
        [ngClass]="{ 'is-invalid': loginForm.controls['username'].invalid }" />
      <!-- <input  class="form-control form-control-solid h-auto py-7 px-6 rounded-lg" type="text" placeholder="Username"
        name="usernameEnc" formControlName="usernameEnc" autocomplete="off"
        [ngClass]="{ 'is-invalid': loginForm.controls['username'].invalid }" /> -->
      <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
          validation: 'required',
          message: 'Username is required',
          control: loginForm.controls['username']
        }"></ng-container>
      <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
          validation: 'username',
          message: 'Username is invalid',
          control: loginForm.controls['username']
        }"></ng-container>
      <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
          validation: 'minLength',
          message: 'Username should have at least 3 symbols',
          control: loginForm.controls['username']
        }"></ng-container>
      <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
          validation: 'maxLength',
          message: 'Username should have maximum 360 symbols',
          control: loginForm.controls['username']
        }"></ng-container>
    </div>
    <!--end::Form group-->

    <!--begin::Form group-->
    <div class="form-group position-relative">
      <div class="d-flex justify-content-between mt-n5">
        <!-- <label class="font-size-h6 font-weight-bolder text-dark pt-5"
          >Password</label -->

        <!-- <a
          routerLink="/auth/forgot-password"
          class="text-primary font-size-h6 font-weight-bolder text-hover-primary pt-5"
          id="kt_login_forgot"
        >
          Forgot Password ?
        </a> -->
      </div>
      <div class="position-relative">
      <input  class="form-control form-control-solid h-auto py-7 px-6 rounded-lg" [attr.type]="showPassword ? 'text' : 'password'" placeholder="Password"
        name="password" autocomplete="off" formControlName="password"
        [ngClass]="{ 'is-invalid': loginForm.controls['password'].invalid }" />
      <!-- <input  class="form-control form-control-solid h-auto py-7 px-6 rounded-lg" type="password" placeholder="Password"
        name="passwordEnc" autocomplete="off" formControlName="passwordEnc"
        [ngClass]="{ 'is-invalid': loginForm.controls['password'].invalid }" /> -->

        <span
        class="eye-icon"
        style="position: absolute;top: 48%;
        right: 30px;
        transform: translateY(-50%); cursor: pointer;"
        (click)="togglePasswordVisibility()"
      >
        <i style="font-size: 18px;" [class]="showPassword ? 'fa fa-eye-slash' : 'fa fa-eye'"></i>
      </span>

      <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
          validation: 'required',
          message: 'Password is required',
          control: loginForm.controls['password']
        }"></ng-container>
      <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
          validation: 'minlength',
          message: 'Password should have at least 3 symbols',
          control: loginForm.controls['password']
        }"></ng-container>
      <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
          validation: 'maxLength',
          message: 'Password should have maximum 100 symbols',
          control: loginForm.controls['password']
        }"></ng-container>
        </div>
    </div>
    <!--end::Form group-->

    <!--begin::Action-->

    <!-- <div class="d-flex jusity-content-end ng-star-inserted">
      <div class="ml-auto">
      <a class="text-danger text-decoration-none" href="#/auth/forgot-password">Forgot password?</a>
      </div>
    </div> -->

    <!-- href="#/login/forgotpassword" -->
    <div class="pb-lg-0 pb-5">
      <button type="submit" id="kt_login_signin_submit"
        class="btn btn-primary font-weight-bolder btn-block font-size-h6 px-8 py-4 my-3 mr-3"
        [disabled]="isDisable">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading">Please wait...</span>
      </button>

      <!-- <button
        type="button"
        class="btn btn-light-primary font-weight-bolder px-8 py-4 my-3 font-size-lg"
      >
        <span class="svg-icon svg-icon-md">
          <img src="./assets/media/svg/social-icons/google.svg" />
        </span>
        Sign in with Google
      </button> -->

      <ng-container *ngIf="isLoading$ | async">
        <span class="spinner spinner-primary ml-5"></span>
      </ng-container>
    </div>
    <!--end::Action-->
  </form>
  <!--end::Form-->
  <div class="py-7 py-lg-10">
    <a href="https://idc.net.pk/contact-us/" target="_blank" class="font-weight-bold">Contact Us</a>
    | <a href="#" target="" class="font-weight-bold">Privacy Policy</a>
  </div>
</div>
<!--end::Signin-->

<ng-template #formError let-control="control" let-message="message" let-validation="validation">
  <ng-container *ngIf="control.hasError(validation) && (control.dirty || control.touched)">
    <div class="fv-plugins-message-container">
      <div class="fv-help-block">
        {{ message }}
      </div>
    </div>
  </ng-container>
</ng-template>
<ngx-spinner class="spinner-info" bdColor="rgba(0,0,0,0.8)" size="large" color="#fff" type="square-loader"
  [fullScreen]="true">
  <p style="color: white"> Loading... </p>
</ngx-spinner>
