            bdColor="rgba(0,0,0,0.8)" size="medium" color="#fff" type="square-loader"
            [fullScreen]="false">
            <p style="color: white"> Loading... </p>
            </ngx-spinner>

                <div class="col-md-7 col-sm-12">

                </div>
            </div>
            <div class="row my-3">

            <div class="row" [ngClass]="{
    'd-flex justify-content-end': !EmergencyAssignerDataList?.length
  }">
                <div class="col-md-4 col-sm-12" *ngIf="EmergencyAssignerDataList?.length">
                    <div class="input-group ">
                        <span class="text-danger">Total: {{EmergencyAssignerDataList?.length || 0}}</span>
                    </div>
                </div>
                <div class="col-md-8 col-sm-12">
                    <div class="input-group">
                        <input type="text" placeholder="type to filter" class="form-control form-control-sm" 
                        [(ngModel)]="searchText" name="searchText"/>
                    </div>
                </div>
            </div>              
            <div class="table-responsive table-container fixed-height-table"> 
                <table  class="table table-hover compact table-bordered" style="width: 100%;"
                cellpadding=0 cellspacing=0>
                <thead class="sticky-header">
                    <th>#</th>
                    <th>PIN</th>
                    <th>TP Code</th>
                    <th>Location</th>
                    <th>Assigned By</th>
                    <th>Doctor Name</th>
                    <th>Assigned At</th>
                </thead>
                <tbody>
                    <tr class="text-center" *ngIf="!(EmergencyAssignerDataList?.length > 0)">
                        <td colspan="7">No Record Found</td>
                    </tr>
                    <tr *ngFor="let data of EmergencyAssignerDataList | filterByKey: searchText:['VisitId', 'TPCode', 'LocName', 'AssignedDocName']; let i = index" (click)="getTableData(data, i)" [ngClass]="{'active-rec-border-left': i == rowIndex}">
                        <td>{{i + 1}}</td>
                        <td>{{data.VisitId}}</td>
                        <td>{{data.TPCode}}</td>
                        <td>{{data.LocName}}</td>
                        <td>{{data.CreatedBy}}</td> 
                        <td>{{data.AssignedDocName}}</td>
                        <td>{{data.AssignedDate | date:"dd MMM, yyyy, h:mm a"}}</td>
                    </tr>
                </tbody>
            </table>
            </div>
        </div>    
    </div>
</div>
