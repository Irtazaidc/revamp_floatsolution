<!-- <div class="col-md-6 col-sm-12"> -->
<div class="card ">

    <!-- card-custom gutter-t -->
    <!-- style="border: none;
            border-bottom: grey solid 1px;
            border-radius: 0px" 
    style="border: none;
                border-bottom: grey solid 1px;
                border-radius: 0px"  -->
    <div class="card-body px-4 py-4">
        <div class="row mb-2">
            <!-- &nbsp; &nbsp; -->
            <div class="col-md-12">
                <mat-checkbox class="example-margin ml-2" [ngModelOptions]="{standalone: true}"[(ngModel)]="isThisPatient"  > <span>Selected Patient?</span> </mat-checkbox>
            </div>
            <div class="col-md-6">
                <input type="text" (change)="searchFieldsChange('internalPhoneNumber')" placeholder="Phone Number" (keyup.enter)="searchPatientVisit()"
                    [(ngModel)]="internalPhoneNumber" class="form-control" />
            </div>
            <div class="col-sm-12 col-md-6 col-lg-6">
                <input type="text" (change)="searchFieldsChange('internalVisitID')"  placeholder="Visit ID" (keyup.enter)="searchPatientVisit()"
                [(ngModel)]="internalVisitID" class="form-control" />
            </div>
            <div class="col-sm-12 col-md-6 col-lg-8 col-xl-9 mt-2">
                <ng-select  type="text" multiple="true" tabindex="1" placeholder="Test(s)" [(ngModel)]="selTps" (change)="changeTPs()"
                    name="selTps" [closeOnSelect]="true">
                    <ng-option style="width: 100%;" [value]="tp.TPId" *ngFor="let tp of TPList">
                        {{tp.TPFullName}}
                    </ng-option>
                </ng-select>
            </div>
            <div class="col-sm-12 col-md-6 col-lg-4 col-xl-3 mt-2">
                <div class="btn-group pull-right" role="group" aria-label="Basic example">
                <button  class="btn btn-primary pull-right" style="padding: 0.55rem 1rem" (click)="refreshVisits()"><span ><i class="ti-reload cursor-pointer"></i></span></button>
                <button  class="btn btn-primary ml-1 pull-right" style="padding: 0.55rem 1rem" (click)="searchPatientVisit()"><span ><i class="fa fa-search cursor-pointer"></i></span></button>
                </div>    
            </div>
            
            
            <!-- <select class="form-control col-4"  [(ngModel)]="internalPhoneNumber">
                <option [value]="''">--select--</option>
                <option *ngFor="let tp of TPList" [value]="tp.TPId">{{tp.TestProfileName}}</option>
            </select> -->
            

        </div>
        <ng-container *ngIf="pagination.paginatedSearchResults; then VisitListSpace else NoVisitFound">
        </ng-container>
        <ng-template #VisitListSpace>
            <div class="row">
                <div class="col-9">
                    <input type="text" placeholder="Search" class="form-control form-control-sm  pull-right" (keyup)="filterResults()" [(ngModel)]="searchText" name="searchText"/>
                </div>
                <div class="col-3 text-right">
                    <span class="text-danger"> <strong>Total Records: {{VisitsList.length}}</strong></span>
                </div>
            </div>
            <div class="table-responsive">
                <ngx-spinner class="spinner-info" bdColor="rgba(0,0,0,0.8)" [name]="spinnerRefs.visitListSection"
                    size="medium" color="#fff" type="square-loader" [fullScreen]="false">
                    <p style="color: white"> Loading... </p>
                </ngx-spinner>
                <table class="table table-hover compact">
                    <thead>
                        <tr style="font-weight: bold;">
                            <th scope="col">PIN</th>
                            <th scope="col">Name</th>
                            <!-- <th scope="col">Cell</th> -->
                            <th scope="col">Visit Date Time</th>
                        </tr>
                    </thead>
                    <tbody id="">
                        <tr (click)="visitRowClick(v,indx)"
                            *ngFor="let v of pagination.paginatedSearchResults;let indx = index" class="cursor-pointer"
                            [ngClass]="{'active': v.VisitId==VisitIdActive}">
                            <td>
                                <span  class="copy-text-button" ngbTooltip="Copy to clipboard">
                                <i 
                                    [ngClass]="returnCopyClasses(indx)"
                                    ngbPopover="copied" triggers="click:mouseleave"
                                    (click)="copyText(v.PIN,indx)">&nbsp;</i>
                            </span> {{v.PIN}}</td>
                            <td> {{v.PatientName}}</td>
                            <!-- <td> {{v.Cell}}</td> -->
                            <td> {{v.VisitDateTime | dateFormat: 'DD-MM-YYYY h:mm:ss a'}}</td>
                        </tr>
                    </tbody>
                </table>

            </div>
            <div class="row">
                <div class="col-8">
                    <div class="d-flex justify-content-between p-2">
                        <ngb-pagination [collectionSize]="pagination.collectionSize" [(page)]="pagination.page" size=""
                            [pageSize]="pagination.pageSize" [boundaryLinks]="true" [maxSize]="3" [rotate]="true"
                            (pageChange)="refreshPagination()">
                        </ngb-pagination>
                    </div>
                </div>
                <div class="col-lg-4">
                    <select class="custom-select" style="width: auto" [(ngModel)]="pagination.pageSize"
                        (ngModelChange)="refreshPagination()">
                        <option [ngValue]="5">5 Records</option>
                        <option [ngValue]="10">10 Records</option>
                        <option [ngValue]="20">20 Records</option>
                        <option [ngValue]="50">50 Records</option>
                        <option [ngValue]="100">100 Records</option>
                    </select>
                </div>

            </div>
        </ng-template>
        <ng-template #NoVisitFound>
            <div style="font-weight: bold;text-align: center;">No Visit Found</div>
        </ng-template>
    </div>
</div>
<!-- </div> -->
