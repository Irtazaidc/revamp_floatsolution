<div class="row">
    <div class="col-12 text-center" style="padding: 17px 13px;">
        <button *ngIf="btnPermission.vitals" class="btn btn-action mr-1 mt-1" (click)="openRequestedScreen('vitals')"><i class="fa fa-heartbeat text-white fa-action"></i> <br>Vitals</button> 
        <button *ngIf="btnPermission.emr" class="btn btn-action mr-1 mt-1" (click)="openRequestedScreen('emr')"><i class="ti-receipt text-white fa-action"></i> <br>EMR</button>
        <button *ngIf="btnPermission.moConsent" class="btn btn-action mr-1 mt-1" (click)="openRequestedScreen('moConsent')"><i class="fa fa-file text-white fa-action"></i> <br>MO Report</button>
        <button *ngIf="btnPermission.moConsentView && MOBy" class="btn btn-action mr-1 mt-1" (click)="openRequestedScreen('moConsentView')"><i class="fa fa-eye text-white fa-action"></i> <br>MO View</button>
        <button *ngIf="btnPermission.pacs" class="btn btn-action mr-1 mt-1" (click)="commingSoon()"><i class="ti-layout-media-right-alt text-white fa-action"></i> <br>PACS</button>
        <button *ngIf="btnPermission.printReport && (StatusId>7||RISStatusID>9)" class="btn btn-action mr-1 mt-1" (click)="printRadioReport()"><i class="fa fa-print text-white fa-action"></i> <br>Print Report</button>

        <button *ngIf="btnPermission.techHistory" class="btn btn-action mr-1 mt-1" (click)="getTechHistory()"><i class="fas fa-clipboard-list text-white fa-action"></i> <br>Tech Hisoty</button>
        <ng-container *ngIf="btnPermission.dicom">
            <app-dicom-button  [btnPayload]="{TPID:TPID,VisitID:VisitID, styleClass:'btn btn-action mr-1 mt-1',iconClass:'fas fa-x-ray text-white fa-action', btnText:'DICOM',breakIcon:true}"></app-dicom-button>
        </ng-container>
        
        
    </div>
</div>


<ng-template #emrModal let-emrModal>
    <div class="modal-header" style="display: block !important; padding: 1rem 1.75rem;">
        <div class="row">
            <div class="col-12">
                <button type="button" class="close mb-2 mt-2" aria-label="Close" (click)="emrModal.close()">
                    <span aria-hidden="true" style="display: inline-block; color:grey;">&times;</span>
                </button>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <app-patient-basic-info class="bg-light" [PatientId]="PatientID" [VisitDateTime]="{RegistrationDate:RegistrationDate,DeliveryDate:DeliveryDate}"></app-patient-basic-info>
            </div>
        </div>
    </div>
    <div class="modal-body">
        <app-emr [visitInfo]="visitInfo"></app-emr>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-outline-secondary" data-dismiss="modal" (click)="emrModal.close()">
            <i class="fa fa-times-circle"></i> Close
        </button>
    </div>
</ng-template>


<ng-template #vitalsModal let-vitalsModal>
    <div class="modal-header" style="display: block !important; padding: 1rem 1.75rem;">
        <div class="row">
            <div class="col-12">
                <button type="button" class="close mb-2 mt-2" aria-label="Close" (click)="vitalsModal.close()">
                    <span aria-hidden="true" style="display: inline-block; color:grey;">&times;</span>
                </button>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <app-patient-basic-info class="bg-light" [PatientId]="PatientID" [VisitDateTime]="{RegistrationDate:RegistrationDate,DeliveryDate:DeliveryDate}"></app-patient-basic-info>
            </div>
        </div>
    </div>
    <div class="modal-body">
        <app-vitals [visitInfo]="visitInfo" [vitalSectionShow]="{formSection:true, cardSection:false}"  (isStatusChanged)="isStatusChangedRec($event)"></app-vitals>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-outline-secondary" data-dismiss="modal" (click)="vitalsModal.close()">
            <i class="fa fa-times-circle"></i> Close
        </button>
    </div>
</ng-template>

<ng-template #techHistoryModal let-techHistoryModal>
    <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Tech History</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="techHistoryModal.close()">
            <i aria-hidden="true" class="ki ki-close"></i>
        </button>
    </div>
    <!-- <div class="modal-header" style="display: block !important;">
        <h5 class="modal-title" id="exampleModalLabel">Tech History</h5>
        <div class="row">
            <div class="col-12">
                <button type="button" class="close" aria-label="Close" (click)="techHistoryModal.close()">
                    <span aria-hidden="true" style="display: inline-block; color:grey;">&times;</span>
                </button>
            </div>
        </div>
    </div> -->
    <div class="modal-body">
        <ng-container *ngIf="objJson !==null && objJson.length  && isHistory">
            <div class="history" style="max-height: 360px; overflow-y: auto;">
                <div *ngFor="let h of objJson; let i = index">
                    <span *ngIf="h.technicianHitory || h.technicianHitory!==''" class="text-primary"> {{h.unserName}} | {{h.savedOn}} </span>
                    <p *ngIf="h.technicianHitory || h.technicianHitory!==''" style="border-bottom: 1px dashed #cccdd3;">{{h.technicianHitory}}</p>
                </div>
            </div>
           
        </ng-container>
        <ng-container *ngIf="objJson===null || !objJson.length || !isHistory">
            <!-- <p style="border-bottom: 1px dashed #cccdd3; text-align: center;"><strong class="text-primary">No history found</strong></p> -->
            <!-- <div class="container"> -->
                <app-no-record-found [pyClassParam]="'py-5'" [infoMessageParam]="'No history found'"></app-no-record-found>
            <!-- </div> -->
        </ng-container>
    </div>
    <div class="modal-footer" style="padding: 6px 9px;">
        <button type="button" class="btn btn-sm btn-outline-dark" data-dismiss="modal" (click)="techHistoryModal.close()">
            <i class="fa fa-times-circle"></i> Close
        </button>
    </div>
</ng-template>
