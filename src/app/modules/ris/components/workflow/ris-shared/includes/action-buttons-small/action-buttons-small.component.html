<div class="card-toolbar">
    <div class="row">
        <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12">
            <div class="pull-right mt-2">
                <span *ngIf="btnPermission.dicom" ngbTooltip="PACs Images" class="badge badge-danger cursor-pointer bg-danger" [ngClass]="{'lable-active': isActive==7}"
                mwlConfirmationPopover
                [popoverTitle]="'Please Confirm'"
                [popoverMessage]="'Are you sure want to open DICOM?'"
                [confirmText]="confirmationPopoverConfig.confirmText"
                [cancelText]="confirmationPopoverConfig.cancelText"
                [placement]="confirmationPopoverConfig.placements[0]" 
                (confirm)="getPACSServers(7)"
                (cancel)="confirmationPopoverConfig.confirmPopoverCancel()"
                confirmButtonType="btn btn-sm btn-primary" 
                cancelButtonType="btn btn-sm btn-outline-secondary"
                (click)="confirmationPopoverConfig.confirmClicked = false; confirmationPopoverConfig.cancelClicked = false"
                [appendToBody]="true"><i aria-hidden="true" class="fas fa-x-ray text-white"></i> DICOM</span> 

                <span *ngIf="btnPermission.dictionary" ngbTooltip="Dictionary" class="badge badge-dark cursor-pointer bg-dark" [ngClass]="{'lable-active': isActive==6}"
                (click)="openRequestedScreen('dictionary',6)"><i aria-hidden="true" class="fa fa-book text-white"></i> Dictionary</span>

                <span *ngIf="btnPermission.vitals" ngbTooltip="Vitals Detail" class="badge badge-danger cursor-pointer bg-tomato" [ngClass]="{'lable-active': isActive==1}"
                (click)="openRequestedScreen('vitals',1)"><i aria-hidden="true" class="fa fa-heartbeat text-white"></i> Vitals</span>

                <span *ngIf="btnPermission.emr" ngbTooltip="Electronic Medical Records" class="badge badge-primary cursor-pointer" [ngClass]="{'lable-active': isActive==2}"
                (click)="openRequestedScreen('emr',2)"><i aria-hidden="true" class="ti-receipt text-white"></i> EMR</span>

                <span *ngIf="btnPermission.techHistory" ngbTooltip="Tech Hisoty" class="badge badge-danger cursor-pointer" [ngClass]="{'lable-active': isActive==5}"
                (click)="getTechHistory('techHistory',5)"><i aria-hidden="true" class="fas fa-clipboard-list text-white"></i> Tech History</span>

                 <span *ngIf="btnPermission.moConsent" ngbTooltip="MO History Report" class="badge badge-success cursor-pointer" [ngClass]="{'lable-active': isActive==3}"
                 (click)="openRequestedScreen('moConsent',3)"><i aria-hidden="true" class="fa fa-file text-white"></i> MO History</span>

                 <span *ngIf="btnPermission.moConsentView && MOBy" ngbTooltip="MO History View" class="badge badge-warning cursor-pointer" [ngClass]="{'lable-active': isActive==4}"
                 (click)="openRequestedScreen('moConsentView',4)"><i aria-hidden="true" class="fa fa-eye text-white"></i> MO History view</span>

                 <!-- <span *ngIf="btnPermission.reportView" ngbTooltip="Print Report" class="badge badge-warning cursor-pointer" [ngClass]="{'lable-active': isActive==4}"
                 (click)="printReport(null,null)"><i aria-hidden="true" class="fa fa-eye text-white"></i> View Report</span> -->

                <span *ngIf="btnPermission.pacs" ngbTooltip="PACS" class="badge bg-tomato cursor-pointer" [ngClass]="{'lable-active': isActive==4}"
                (click)="commingSoon()"><i aria-hidden="true" class="ti-layout-media-right-alt text-white"></i> PACS</span>

                <span *ngIf="btnPermission.printReport && (StatusId>7||RISStatusID>9)"  ngbTooltip="Print Report" class="badge badge-dark cursor-pointer" [ngClass]="{'lable-active': isActive==6}"
                 (click)="printRadioReport('',6)"><i aria-hidden="true" class="fa fa-print text-white"></i> Print Report</span>
            </div>
        </div>
    </div>
</div>


<ng-template #emrModal let-emrModal>
    <div class="modal-header" style="display: block !important; padding: 1rem 1.75rem;">
        <div class="row">
            <div class="col-12">
                <button type="button" class="close mb-2 mt-2" aria-label="Close" (click)="emrModal.close()">
                    <span aria-hidden="true" style="display: inline-block; color:grey;">&times;</span>
                </button>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <app-patient-basic-info class="bg-light" [PatientId]="PatientID" [VisitDateTime]="{RegistrationDate:RegistrationDate,DeliveryDate:DeliveryDate}"></app-patient-basic-info>
            </div>
        </div>
    </div>
    <div class="modal-body">
        <app-emr [visitInfo]="visitInfo"></app-emr>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-outline-secondary" data-dismiss="modal" (click)="emrModal.close()">
            <i class="fa fa-times-circle"></i> Close
        </button>
    </div>
</ng-template>

            </div>

        <div class="row">

<!------------------------begin:: Dictionary Modal -------------------------------------------------------------->
<ng-template #dictionaryModal let-dictionaryModal>
    <div class="modal-header" style="display: block !important; padding: 1rem 1.75rem;">
        <div class="row">
            <div class="col-12">
                <button type="button" class="close mb-2 mt-2" aria-label="Close" (click)="dictionaryModal.close()" style="height: 17px;">
                    <span aria-hidden="true" style="display: inline-block; color:grey; font-size: 27px;">&times;</span>
                </button>
            </div>
        </div>
    </div>
    <div class="modal-body">
        <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12">
            <app-card [title]="CardTitle" [cardClass]="'tim-card tim-card tim-card-primary'" >
                <div class="card-body">
                    <ngx-spinner class="spinner-info" bdColor="rgba(0,0,0,0.8)" [name]="spinnerRefs.formSection" size="medium" color="#fff" type="square-loader" [fullScreen]="false">
                        <p style="color: white"> Please wait... </p>
                    </ngx-spinner>
                    <form class="" [formGroup]="_form">
                        <div class="row">
                            <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12">
                                <div class="form-group">
                                    <label for="TextCode" class="control-label">Text Code:</label>
                                    <input type="text" class="form-control form-control-sm" formControlName="TextCode"
                                    [ngClass]="{'invalid': _form.get('TextCode').errors && _form.get('TextCode').touched, 'invalid-highlighted': _form.get('TextCode').errors}">
                                </div>
                            </div>
                            <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 ">
                                <div class="form-group">
                                    <label for="TextDescription" class="control-label">Text Desctription:</label>
                                    <ckeditor [required]="true" [config]="config" formControlName="TextDescription" name="TextDescription" 
                                        [(ngModel)]="TextDescription" [ngClass]="{'invalid': _form.get('TextDescription').errors && _form.get('TextDescription').touched, 'invalid-highlighted': _form.get('TextDescription').errors}">
                                    </ckeditor>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-12">
                                <hr>
                            </div>
                            <div class="col-12 mt-3">
                                <button type="reset" class="btn btn-sm btn-outline-danger ml-2 pull-right" (click)="clearForm()"><i class="fa fa-eraser"></i>Clear<i aria-hidden="true"></i></button>
                                
                                <button
                                    [disabled]="disabledButton || _form.invalid"
                                    class="btn btn-sm btn-primary pull-right"
                                    mwlConfirmationPopover
                                    [popoverTitle]="'Please confirm...!'"
                                    [popoverMessage]="confirmationPopoverConfig.popoverMessage"
                                    [confirmText]="confirmationPopoverConfig.confirmText"
                                    [cancelText]="confirmationPopoverConfig.cancelText"
                                    [placement]="confirmationPopoverConfig.placements[0]"
                                    (confirm)="insertUpdateDictionary()"
                                    (cancel)="confirmationPopoverConfig.confirmPopoverCancel()"
                                    confirmButtonType="btn btn-sm btn-primary"
                                    cancelButtonType="btn btn-sm btn-outline-secondary"
                                    (click)="confirmationPopoverConfig.confirmClicked = false; confirmationPopoverConfig.cancelClicked = false"
                                    [appendToBody]="true">
                                    <i 
                                    [ngClass]="'fa fa-save'"
                                    ></i>Save <i class="spinner-border-custom" aria-hidden="true" [hidden]="isSpinner" ></i>
                                </button>
                                
                            </div>
                        </div>
                    </form>
                </div>
            </app-card>

        </div>

    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-outline-secondary" data-dismiss="modal" (click)="dictionaryModal.close()">
            <i class="fa fa-times-circle"></i> Close
        </button>
    </div>
</ng-template>
<!------------------------ end:: Dictionary Modal -------------------------------------------------------------->
