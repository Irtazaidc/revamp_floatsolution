<ng-container *ngIf="user">
  <div class="card card-custom card-stretch" [formGroup]="resetForm">
    <!-- begin::Loading -->
    <ng-container *ngIf="isLoading$ | async">
      <div class="progress progress-modal">
        <div
          class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
          role="progressbar"
          style="width: 100%"
          aria-valuenow="100"
          aria-valuemin="0"
          aria-valuemax="100"
        ></div>
      </div>
    </ng-container>
    <!-- end::Loading -->
    <!--begin::Header-->
    <div class="card-header py-3">
      <div class="card-title align-items-start flex-column">
        <h3 class="card-label font-weight-bolder text-dark">Change Password</h3>
        <span class="text-muted font-weight-bold font-size-sm mt-1">Change your account password</span>
      </div>
      <div class="card-toolbar">
        <button type="submit" [disabled]="resetForm.invalid" class="btn btn-success mr-2" (click)="resetPassword()">Save Changes</button>
        <button type="reset" class="btn btn-secondary" (click)="cancel()">Cancel</button>
      </div>
    </div>
    <!--end::Header-->
    <!--begin::Form-->
    <div class="form container mt-2">
      <div class="card-body ">
        <!--begin::Alert-->
        <div class="alert alert-custom alert-light-danger fade show mb-10" role="alert" >
          <div class="alert-icon" >
            <!-- <span class="svg-icon svg-icon-3x svg-icon-danger"
              cacheSVG="true"
            >
            </span>
             -->
             <i class="flaticon2-exclamation icon-2x"></i>
          </div>
          <div class="alert-text font-weight-bold">The input should have at least 6 characters, Password must contain one uppercase letter, one lowercase letter
            <br> one number and one Special Character @#$%&*."

            <!-- <p>Configure user passwords to expire periodically. Users will need warning that their passwords are going to expire,
              or they might inadvertently get locked out of the system!</p> -->
          </div>
          <div class="alert-close">
            <button type="button" class="close" data-dismiss="alert" aria-label="Close" >
              <span aria-hidden="true">
                <i class="ki ki-close"></i>
              </span>
            </button>
          </div>
        </div>
        <!--end::Alert-->
        <div class="form-group row">
          <label class="col-xl-3 col-lg-3 col-form-label text-alert">Current Password</label>
          <div class="col-lg-9 col-xl-6 ">
              <div class="position-relative">
                <input type="password"
                class="form-control form-control-lg form-control-solid mb-2"
                placeholder="Current password"
                autocomplete="off"
                formControlName="currentPassword"
                [ngClass]="{'invalid': resetForm.get('currentPassword').errors , 'invalid-highlighted': resetForm.get('currentPassword').errors && isSubmitted }"
              
                [type]="showPassword ? 'text' : 'password'"
              >
                <span class="text-button"  ngbTooltip="Show Password">
                    <i class="fa fa-eye"   triggers="click:mouseleave"
                        (click)="showPassword = !showPassword"></i>
                </span>
                <!-- <span class="text-button" *ngIf="hidePassword" ngbTooltip="Hide Password">
                  <i class="fa fa-eye-slash"   triggers="click:mouseleave"
                  (click)="hidePassword = !hidePassword"></i>
                </span> -->
                <span class="md-line"></span>
            </div> 
            <!-- [class.is-invalid]="isControlInvalid('currentPassword')"
                [class.is-valid]="isControlValid('currentPassword')" -->
              <!-- <button [class.active]="showPassword" type="button" (click)="showPassword = !showPassword" style="
              border: none;">
                <i class="fa fa-eye"></i>
              </button>            -->
              <!-- (focus)="showPassword = !showPassword -->

            <!-- <div class="valid-feedback" *ngIf="isControlValid('currentPassword')">Current password was entered correct</div>
            <div class="invalid-feedback" *ngIf="controlHasError('required', 'currentPassword')">First name is required</div>
            <a class="text-sm font-weight-bold cursor-pointer">Forgot password ?</a> -->
          </div>
        </div>
        <div class="form-group row">
          <label class="col-xl-3 col-lg-3 col-form-label text-alert">New Password</label>
          <div class="col-lg-9 col-xl-6">
            <input type="password" id="myInput"
              class="form-control form-control-lg form-control-solid"
              placeholder="New password"
              autocomplete="off"
              formControlName="password"
              [type]="showPassword ? 'text' : 'password'"
              [class.is-invalid]="isControlInvalid('password')"
              [class.is-valid]="isControlValid('password')" 
              
            />
            <!-- ngbTooltip="New Password must have 6+ chars, 1 uppercase, 1 lowercase, 1 number, and 1 special char (@#$%&*)." -->
          </div>
        </div>
        <div class="form-group row">
          <label class="col-xl-3 col-lg-3 col-form-label text-alert">Verify Password</label>
          <div class="col-lg-9 col-xl-6">
            <input type="password"
              class="form-control form-control-lg form-control-solid"
              placeholder="Confirm password"
              autocomplete="off"
              formControlName="cPassword"
              [type]="showPassword ? 'text' : 'password'"
              [class.is-invalid]="isControlInvalid('cPassword')"
              [class.is-valid]="isControlValid('cPassword')" 
            />
            <div class="valid-feedback" *ngIf="isControlValid('cPassword')">Password confirmation was entered correct</div>
            <div class="invalid-feedback" *ngIf="controlHasError('ConfirmPassword', 'cPassword')">'Passsword' and 'Confirm Password' didn't match.</div> 
          </div>
        </div>
      </div>
    </div>
    <!--end::Form-->
  </div>
</ng-container>
