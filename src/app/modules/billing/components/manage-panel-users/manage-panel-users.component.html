<div class="card card-custom">
    <div class="card-header">
        <div class="card-title">
            <span class="card-icon">
                <i class="fa fa-user-circle text-primary"></i>
            </span>
            <h3 class="card-label">
                Manage Panel Users
            </h3>
        </div>
    </div>
    <div class="card-body">
        <div class="row">
            <ngx-spinner class="spinner-warning" [name]="spinnerRefs.searchTable" bdColor="rgba(0,0,0,0.8)"
                size="medium" color="#fff" type="ball-atom" [fullScreen]="false">
                <!-- <p style="color: white"> Loading... </p> -->
            </ngx-spinner>
            <div class="col-md-4 col-sm-12">
                <div class="row">
                    <div class="col-md-12">
                        <div class="input-group">
                            <input type="text" placeholder="type to filter" class="form-control form-control-sm"
                                [(ngModel)]="searchText" name="searchText" />
                            <button class="btn btn-mini btn-outline-primary input-group-btn-custom"
                                (click)="getPanelUsersData()"><i class="ti-reload"></i></button>
                        </div>
                    </div>
                    <div class="col-md-12">
                        <div class="table-responsive table-container fixed-height-table">
                            <table class="table table-hover compact table-bordered"
                                style="width: 100%; " cellpadding=0 cellspacing=0>
                                <thead class="sticky-header">
                                    <th>#</th>
                                    <th>Panel Users</th>
                                    <th>FullName</th>
                                </thead>
                                <tbody>
                                    <tr class="text-center" *ngIf="!panelUsersDataList.length">
                                        <td colspan="3">No Record Found</td>
                                    </tr>
                                    <tr
                                        *ngFor="let data of panelUsersDataList | filterByKey: searchText:['Username','FullName']; let i = index" [ngClass]="{'active':i == rowIndex}" (click)="getTableDate(data,i)">
                                        <td>{{i+1}}</td>
                                        <td>{{data.Username || 'NA'}}</td>
                                        <td>{{data.FullName || 'NA'}}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-8 col-sm-12">
                <div class="row">
                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
                        <form [formGroup]="userCreationForm" class="form-horizontal container mt-4 p-3 border rounded shadow-sm bg-light" name="form" role="form">
                            <ngx-spinner class="spinner-warning" [name]="spinnerRefs.insertForm" bdColor="rgba(0,0,0,0.8)"
                            size="medium" color="#fff" type="ball-atom" [fullScreen]="false">
                            <!-- <p style="color: white"> Loading... </p> -->
                        </ngx-spinner>
                            <div class="row justify-content-center">
                                <!-- Username -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Username: <span class="text-danger">*</span></label>
                                    <input formControlName="Username" type="text" class="form-control"
                                        placeholder="Enter Username" autocomplete="off"
                                        [ngClass]="{'is-invalid': userCreationForm.get('Username').errors && isSubmitted}" />
                                    <div *ngIf="userCreationForm.get('Username').errors && isSubmitted" class="invalid-feedback">
                                        Username is required.
                                    </div>
                                </div>
                        
                                <!-- Password -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Password: <span class="text-danger">*</span></label>
                                    <input formControlName="Password" type="password" class="form-control"
                                        placeholder="Enter Password" autocomplete="off"
                                        [ngClass]="{'is-invalid': userCreationForm.get('Password').errors && isSubmitted}" />
                                    <div *ngIf="userCreationForm.get('Password').errors && isSubmitted" class="invalid-feedback">
                                        Password is required.
                                    </div>
                                </div>
                        
                                <!-- Full Name -->
                                <div class="col-md-12 mb-3">
                                    <label class="form-label">Full Name: <span class="text-danger">*</span></label>
                                    <input formControlName="FullName" type="text" class="form-control"
                                        placeholder="Enter Full Name"
                                        [ngClass]="{'is-invalid': userCreationForm.get('FullName').errors && isSubmitted}" />
                                    <div *ngIf="userCreationForm.get('FullName').errors && isSubmitted" class="invalid-feedback">
                                        Full Name is required.
                                    </div>
                                </div>
                        
                                <!-- Cell -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Cell:</label>
                                    <input formControlName="Cell" (keypress)="validateNo($event)" type="text" class="form-control" placeholder="Enter Cell" />
                                </div>
                        
                                <!-- Phone -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Phone:</label>
                                    <input formControlName="Phone" (keypress)="validateNo($event)" type="text" class="form-control" placeholder="Enter Phone" />
                                </div>
                        
                                <!-- Email -->
                                <div class="col-md-12 mb-3">
                                    <label class="form-label">Email: <span class="text-danger">*</span></label>
                                    <input formControlName="Email" type="email" class="form-control"
                                        placeholder="Enter Email"
                                        [ngClass]="{'is-invalid': userCreationForm.get('Email').errors && isSubmitted}" />
                                    <div *ngIf="userCreationForm.get('Email').errors && isSubmitted" class="invalid-feedback">
                                        A valid email is required.
                                    </div>
                                </div>
                        
                                <!-- Action Buttons -->
                               
                                    <div class="col-12 d-flex justify-content-end flex-wrap gap-4 mt-4">
                                    <button *ngIf="isEditing || isSaveEditing" (click)="InsertUpdatePanelUser()" class="btn btn-success mr-1">
                                        <i class="fas fa-save me-2"></i> 
                                        <span *ngIf="isEditing">Update</span>
                                        <span *ngIf="isSaveEditing">Save</span>
                                    </button>
                                    <button *ngIf="isEditing || isSaveEditing" (click)="cancelEdit()" class="btn btn-secondary mr-1">
                                        <i class="fas fa-times-circle me-2"></i> Cancel
                                    </button>
                                    <button  *ngIf="toggleEditFields" (click)="refreshForm()" class="btn btn-info mr-1">
                                        <i class="fas fa-sync-alt me-2"></i> Refresh
                                    </button>
                                    <!-- <button  *ngIf="toggleEditFields" (click)="deleteUser()" class="btn btn-danger mr-1">
                                        <i class="fas fa-trash-alt me-2"></i> Delete
                                    </button> -->
                                    <button *ngIf="toggleEditFields" 
                                        type="button" 
                                        class="btn btn-danger mr-1" mwlConfirmationPopover
                                        [popoverTitle]="'Do you want to proceed <strong>Delete</strong>?'"
                                        [confirmText]="confirmationPopoverConfig.confirmText"
                                        [cancelText]="confirmationPopoverConfig.cancelText"
                                        [placement]="confirmationPopoverConfig.placements[0]"
                                        (confirm)="deleteUser()"
                                        (cancel)="confirmationPopoverConfig.confirmPopoverCancel()"
                                        confirmButtonType="btn btn-sm btn-primary"
                                        cancelButtonType="btn btn-sm btn-outline-secondary"
                                        (click)="confirmationPopoverConfig.confirmClicked = false; confirmationPopoverConfig.cancelClicked = false"
                                        [appendToBody]="true">
                                        <i class="fas fa-trash-alt me-2"></i> Delete 
                                    </button>
                                    <button  *ngIf="toggleEditFields" (click)="editUser()" class="btn btn-outline-primary mr-1">
                                        <i class="fas fa-edit me-2"></i> Edit
                                    </button>
                                    <button  *ngIf="toggleEditFields" (click)="copyUser()" class="btn btn-warning mr-1">
                                        <i class="fas fa-copy me-2"></i> Copy
                                    </button>
                                    <button  *ngIf="toggleEditFields" (click)="createNewUser()" class="btn btn-primary">
                                        <i class="fas fa-plus-circle me-2"></i> New
                                    </button>
                                    </div>
  
                                
                            </div>
                        </form>                        
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
