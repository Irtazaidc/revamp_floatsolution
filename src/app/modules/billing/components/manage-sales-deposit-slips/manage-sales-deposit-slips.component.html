<div class="row">
    <div class="col-md-4 col-sm-12">
        <div class="card card-custom">
            <div class="card-header">
                <div class="card-title">
                    <span class="card-icon">
                        <i class="fa fa-sticky-note text-primary"></i>
                    </span>
                    <h3 class="card-label">
                        View Sales Deposit Slips
                        <!-- <small>Manage Sales Deposit Slips</small> -->
                    </h3>
                </div>
            </div>
            <div class="card-body pb-3">
                <div class="row">
                    <div class="col-12">
                        <form [formGroup]="searchDepositSlipsForm" class="form-horizontal" name="form" role="form">
                            <div class="row justify-content-center">
                                <div class="col-md-12 col-sm-12">
                                    <div class="form-group">
                                        <label class="control-label">Branch:<span
                                            class="mandatory-asterisk">*</span></label>

                                        <div class="form-group">
                                            <ng-select id="pat_branch" style="width: 100%;"
                                                [ngClass]="{'invalid': searchDepositSlipsForm.get('BranchId').errors, 'invalid-highlighted': searchDepositSlipsForm.get('BranchId').errors && isSubmittedView}"
                                                formControlName="BranchId" [items]="branchList" bindLabel="Title"
                                                [multiple]="true" [closeOnSelect]="false" bindValue="LocId"
                                                placeholder="Select Branch">
                                                <ng-template ng-multi-label-tmp let-items="items" let-clear="clear">
                                                    <div class="ng-value" *ngFor="let item of items | slice:0:2">
                                                        <span class="ng-value-icon right" (click)="clear(item)"
                                                            aria-hidden="true">×</span>
                                                        <span class="ng-value-label"> {{item.Title}}</span>
                                                    </div>
                                                    <div class="ng-value" *ngIf="items.length > 2">
                                                        <span class="ng-value-label">{{items.length - 2}} more...</span>
                                                    </div>
                                                </ng-template>
                                                <ng-template ng-header-tmp>
                                                    <button (click)="onSelectAllBranches()"
                                                        class="btn btn-mini btn-outline-primary" type="button"><i
                                                            class="ti-check"></i>Select all</button>
                                                    <button (click)="onUnselectAllBranches()"
                                                        class="btn btn-mini btn-outline-primary m-l-10 pull-right"
                                                        type="button"><i class="ti-close"></i>Unselect all</button>
                                                </ng-template>
                                            </ng-select>

                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-8 col-sm-12">
                                    <div class="form-group">
                                        <label class="control-label">Sales Date:<span
                                                class="mandatory-asterisk">*</span></label>
                                        <input (click)="dateFrom.toggle()" #dateFrom="ngbDatepicker"
                                            placeholder="dd-mm-yyyy" ngbDatepicker value="1980-08-26"
                                            formControlName="Date" name="Date" class="form-control"
                                            type="text" value="" [maxDate]="maxDate"
                                            [ngClass]="{'invalid': searchDepositSlipsForm.get('Date').errors , 'invalid-highlighted': searchDepositSlipsForm.get('Date').errors && isSubmittedView }" />
                                    </div>
                                </div>
                                <div class="col-md-4 col-sm-12">
                                    <button type="button" (click)="getSalesDepositSlipReportData()" class="btn btn-info custom-button pull-right mt-7" type="button">Search
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card card-custom mt-3">
            <div class="card-body">
                <ngx-spinner class="spinner-warning" [name]="spinnerRefs.searchViewTable" bdColor="rgba(0,0,0,0.8)"
                    size="medium" color="#fff" type="square-loader" [fullScreen]="false">
                    <p style="color: white"> Loading... </p>
                </ngx-spinner>
                <div class="row">
                    <div class="col-md-12">
                        <div class="input-group">
                            <input type="text" placeholder="type to filter" class="form-control form-control-sm"
                                [(ngModel)]="searchText" name="searchText" />
                            <button class="btn btn-mini btn-outline-primary input-group-btn-custom"
                                (click)="getSalesDepositSlipReportData()"><i class="ti-reload"></i></button>
                        </div>
                    </div>
                    <div class="col-md-12">
                        <div class="table-responsive table-container fixed-height-table">
                            <table class="table table-hover compact table-bordered cursor-pointer"
                                style="width: 100%; " cellpadding=0 cellspacing=0>
                                <thead class="sticky-header">
                                    <th>Title</th>
                                    <th>Branch</th>
                                    <th>Remarks</th>
                                </thead>
                                <tbody>
                                    <tr class="text-center" *ngIf="SalesSlipDataList.length<=0">
                                        <td colspan="100">No Record Found</td>
                                    </tr>
                                    <tr *ngFor="let data of SalesSlipDataList | filterByKey: searchText:['Title','LocCode','Remarks']; let i = index" (click)="getTableData(data, i)" [ngClass]="{
                                        'active': i == rowIndex}">
                                        <td>{{data.Title || 'NA'}}</td>
                                        <td>{{data.LocCode || 'NA'}}</td>
                                        <td>{{data.Remarks || 'NA'}}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-8 col-sm-12">
        <div class="card card-custom">
            <div class="card-header">
                <div class="card-title">
                    <span class="card-icon">
                        <i class="fa fa-sticky-note text-primary"></i>
                    </span>
                    <h3 class="card-label">
                        Manage Sales Deposit Slips
                        <!-- <small>Manage Slaes Deposit Slips</small> -->
                    </h3>
                </div>
            </div>
            <div class="card-body pb-4">
                <div class="row">
                    <div class="col-12">
                        <form [formGroup]="SaveDepositSlipsForm" class="form-horizontal" name="form" role="form">
                            <div class="row justify-content-center">
                                <ngx-spinner class="spinner-warning" [name]="spinnerRefs.saveSlipsForm" bdColor="rgba(0,0,0,0.8)"
                    size="medium" color="#fff" type="square-loader" [fullScreen]="false">
                    <p style="color: white"> Loading... </p>
                </ngx-spinner>
                                <div class="col-md-12 col-sm-12">
                                    <div class="row">
                                        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12">
                                            <div class="form-group">
                                                <label class="control-label">Sales Date:<span
                                                        class="mandatory-asterisk">*</span></label>
                                                <input (click)="Salesdate.toggle()" #Salesdate="ngbDatepicker"
                                                    placeholder="dd-mm-yyyy" ngbDatepicker value="1980-08-26"
                                                    formControlName="Salesdate" name="Salesdate" class="form-control"
                                                    type="text" value="" [maxDate]="maxDate"
                                                    [ngClass]="{'invalid': SaveDepositSlipsForm.get('Salesdate').errors , 'invalid-highlighted': SaveDepositSlipsForm.get('Salesdate').errors && isSubmitted }" />
                                            </div>
                                        </div>
                                        <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12">
                                            <div class="form-group">
                                                <label class="">Branch:<span class="mandatory-asterisk">*</span></label>
                                                <ng-select style="width: 100%;" class="mr-1" [items]="branchList"
                                                    bindLabel="Title" formControlName="BranchId"
                                                    placeholder="Select Branch"
                                                    [ngClass]="{'invalid': SaveDepositSlipsForm.get('BranchId').errors , 'invalid-highlighted': SaveDepositSlipsForm.get('BranchId').errors && isSubmitted }"
                                                    bindValue="LocId">
                                                </ng-select>
                                            </div>
                                        </div>
                                        <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
                                            <div class="form-group">
                                                <label>Title:<span class="mandatory-asterisk">*</span></label>
                                                <input formControlName="Title" type="text" class="form-control"
                                                    placeholder="Enter Title"
                                                    [ngClass]="{'invalid': SaveDepositSlipsForm.get('Title').errors, 'invalid-highlighted': SaveDepositSlipsForm.get('Title').errors && isSubmitted  }" />
                                            </div>
                                        </div>
                                        <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
                                            <div class="form-group">
                                                <label>Remarks:<span class="mandatory-asterisk">*</span></label>
                                                <textarea id="remarks" placeholder="Enter Remarks" rows="4"
                                                    formControlName="Remarks" type="text" class="form-control"
                                                    [ngClass]="{'invalid': SaveDepositSlipsForm.get('Remarks').errors, 'invalid-highlighted': SaveDepositSlipsForm.get('Remarks').errors && isSubmitted }"></textarea>
                                                <div class="text-right text-muted"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-12 col-sm-12">
                                    <div class="row">
                                        <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
                                            <div class="docs-area mt-2">
                                                <!-- [forFilterComp]="26"  [isLoadByDefault]="docDefault" [CMSrequestID]="saleDocId" [allowRemove]="true"-->
                                                <app-visit-docs [forFilterComp]="DocTypeId" 
                                                [CMSrequestID]="saleDocId" [module]="screenIdentity"
                                                    [sectionHead]="'Attach'" [layout]="'grid'" 
                                                    [layoutButtons]="['compact', 'list', 'grid', 'grid2']"
                                                    [editing]="{insert:false,select: true, camera: true}"
                                                    (outputDocs)="getLoadedDocs($event)"></app-visit-docs>
                                            </div>                                            
                                        </div>
                                        <div class="mt-8 col-xl-12 col-lg-12 col-md-12 col-sm-12">
                                            <button (click)="clearLoadedDocs()"
                                                class="btn btn-danger custom-button pull-right ml-2" type="button">
                                                <i aria-hidden="true" class="ti-eraser"></i>Clear</button>
                                            <button (click)="saveSalesDepositSlipsDate()"
                                                class="btn btn-primary custom-button pull-right" type="button">
                                                <i aria-hidden="true" class="fa fa-save"></i>Save</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
