<div class="card card-custom">
    <div class="card-header">
        <div class="card-title">
            <span class="card-icon">
                <i class="fa fa-sticky-note text-primary"></i>
            </span>
            <h3 class="card-label">
                View Sales Deposit Slips
                <!-- <small>Manage Sales Deposit Slips</small> -->
            </h3>
        </div>
    </div>
    <div class="card-body pb-4">
        <div class="row">
            <div class="col-12">
                <form [formGroup]="searchDepositSlipsForm" class="form-horizontal" name="form" role="form">
                    <div class="row justify-content-center">
                        <div class="col-xl-4 col-lg-4 col-md-12 col-sm-12">
                            <div class="form-group">
                                <label class="control-label">Sales Date:<span
                                        class="mandatory-asterisk">*</span></label>
                                <input (click)="dateFrom.toggle()" #dateFrom="ngbDatepicker" placeholder="dd-mm-yyyy"
                                    ngbDatepicker value="1980-08-26" formControlName="Salesdate" name="Salesdate"
                                    class="form-control" type="text" value="" [maxDate]="maxDate"
                                    [ngClass]="{'invalid': searchDepositSlipsForm.get('Salesdate').errors , 'invalid-highlighted': searchDepositSlipsForm.get('Salesdate').errors && isSubmitted }" />
                            </div>
                        </div>
                        <div class="col-xl-4 col-lg-4 col-md-12 col-sm-12">
                            <div class="form-group">
                                <label class="control-label">Branch:</label>

                                <div class="form-group">
                                    <ng-select id="pat_branch" style="width: 100%;"
                                        [ngClass]="{'invalid': searchDepositSlipsForm.get('BranchId').errors, 'invalid-highlighted': searchDepositSlipsForm.get('BranchId').errors && isSubmitted}"
                                        formControlName="BranchId" [items]="branchList" bindLabel="Title"
                                        [multiple]="true" [closeOnSelect]="false" bindValue="LocId"
                                        placeholder="Select Branch">
                                        <ng-template ng-multi-label-tmp let-items="items" let-clear="clear">
                                            <div class="ng-value" *ngFor="let item of items | slice:0:2">
                                                <span class="ng-value-icon right" (click)="clear(item)"
                                                    aria-hidden="true">×</span>
                                                <span class="ng-value-label"> {{item.Title}}</span>
                                            </div>
                                            <div class="ng-value" *ngIf="items.length > 2">
                                                <span class="ng-value-label">{{items.length - 2}} more...</span>
                                            </div>
                                        </ng-template>
                                        <ng-template ng-header-tmp>
                                            <button (click)="onSelectAllBranches()"
                                                class="btn btn-mini btn-outline-primary" type="button"><i
                                                    class="ti-check"></i>Select all</button>
                                            <button (click)="onUnselectAllBranches()"
                                                class="btn btn-mini btn-outline-primary m-l-10 pull-right"
                                                type="button"><i class="ti-close"></i>Unselect all</button>
                                        </ng-template>
                                    </ng-select>

                                </div>
                            </div>
                        </div>
                        <div class="mt-8 col-lg-3 col-md-2 col-sm-12">
                            <div (click)="getSalesDepositSlipReportData()" class="btn btn-primary" type="button">Search
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div class="card card-custom mt-3">
    <div class="card-body">
        <div class="row">
            <ngx-spinner class="spinner-warning" [name]="spinnerRefs.searchTable" bdColor="rgba(0,0,0,0.8)"
                size="medium" color="#fff" type="square-loader" [fullScreen]="false">
                <p style="color: white"> Loading... </p>
            </ngx-spinner>
            <div class="col-md-6">
                <div class="row">

                    <div class="col-md-12">
                        <div class="input-group">
                            <input type="text" placeholder="type to filter" class="form-control form-control-sm"
                                [(ngModel)]="searchText" name="searchText" />
                            <button class="btn btn-mini btn-outline-primary input-group-btn-custom"
                                (click)="getSalesDepositSlipReportData()"><i class="ti-reload"></i></button>
                        </div>
                    </div>
                    <div class="col-md-12">
                        <div class="table-responsive table-container fixed-height-table">
                            <table class="table table-hover compact table-bordered"
                                style="width: 100%; min-height: 200px;" cellpadding=0 cellspacing=0>
                                <thead class="sticky-header">
                                    <th>Title</th>
                                    <th>Branch</th>
                                    <th>Remarks</th>
                                </thead>
                                <tbody>
                                    <tr class="text-center" *ngIf="!SalesSlipDataList">
                                        <td colspan="100">No Record Found</td>
                                    </tr>
                                    <tr
                                        *ngFor="let data of SalesSlipDataList | filterByKey: searchText:['Title','LocCode','Remarks']; let i = index">
                                        <td>{{data.Title || 'NA'}}</td>
                                        <td>{{data.LocCode || 'NA'}}</td>
                                        <td>{{data.Remarks || 'NA'}}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="row">
                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
                        <div class="docs-area mt-2">
                            <!-- [forFilterComp]="26" -->
                            <app-visit-docs [isLoadByDefault]="docDefault" [allowRemove]="false"
                                [sectionHead]="'Attached'" [layout]="'grid'"
                                [layoutButtons]="['compact', 'list', 'grid', 'grid2']"
                                [editing]="{insert:false,select: false, camera: false}"></app-visit-docs>
                            <!-- (outputDocs)="getLoadedDocs($event)" -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
