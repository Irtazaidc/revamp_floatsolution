<div class="card card-custom mt-2 mb-2 scrollable scrollable-element perfect-scrollbar">
    <div class="card-toolbar ">
        <div class="card-body">
            <ngx-spinner class="spinner-info" bdColor="rgba(0,0,0,0.8)" [name]="spinnerRefs.sendSMS" size="medium" color="#fff" type="square-loader" [fullScreen]="false">
                <p style="color: white"> Loading... </p>
            </ngx-spinner>
            <div style="max-height: 500px; min-height: 400px; overflow-y: auto;">
                <form [formGroup]="formForSendingSMS" class="form-horizontal mt-4" name="form" role="form"
                (ngSubmit)="SendPatientMessage()">
                <div class="container row d-flex justify-content-center align-items-center">
                    <div class="col-6">
                        <div class="row ">
                            <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
                                <div class="form-group mt-3">
                                    <label for="cellNumber">Cell Number::<span
                                        class="mandatory-asterisk">*</span></label>
                                    <input formControlName="cellNumber" type="text" mask='0000-0000000' [showMaskTyped]="true"
                                    class="form-control"
                                    [ngClass]="{'invalid': formForSendingSMS.get('cellNumber').errors , 'invalid-highlighted': formForSendingSMS.get('cellNumber').errors && isSubmitted }" />
                                </div>
                            </div>
                            <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
                                <div class="form-group mt-3">
                                    <label for="OpratorID">Mobile Operator::<span
                                        class="mandatory-asterisk">*</span></label>
                                    <select class="form-control " formControlName="MobileOperatorID" [ngClass]="{'invalid': formForSendingSMS.get('MobileOperatorID').errors , 'invalid-highlighted': formForSendingSMS.get('MobileOperatorID').errors && isSubmitted }">
                                        <option [value]="''">--Select Operator--</option>
                                        <option *ngFor="let item of mobileOperatorList" [value]="item.id">
                                            {{item.name}}
                                        </option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
                                <div class="form-group mt-3">
                                    <label>Message::<span
                                        class="mandatory-asterisk">*</span></label>
                                    <textarea  maxlength="500" rows="5"
                                        formControlName="Message" type="text" class="form-control" 
                                        [ngClass]="{'invalid': formForSendingSMS.get('Message').errors , 'invalid-highlighted': formForSendingSMS.get('Message').errors && isSubmitted }"></textarea>
                                </div>
                            </div>
                            <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
                                <button class="btn btn-primary pull-right mt-5">
                                    <span> <i class="far fa-envelope"></i>Send</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
            </div> 
        </div>
    </div>
</div>
