
<div class="roles-page">
    <div class="row">
        <div class="col-xs-12 col-sm-12 col-md-6 col-lg-6 col-xl-6">
            <app-card [title]="'Worklist'" [cardClass]="'tim-card tim-card tim-card-primary'">
                <div class="card-body">
                        <div class="input-group">
                            <input type="text" placeholder="Search Test" class="form-control form-control-sm" [(ngModel)]="searchText" name="searchText"/>
                            <button class="btn btn-mini btn-outline-primary input-group-btn-custom"><i class="ti-search"></i></button>
                        </div>
                    <div class="table-responsive fixed-height-table">
                        <ngx-spinner class="spinner-info" bdColor="rgba(0,0,0,0.8)" [name]="spinnerRefs.testListSection" size="medium" color="#fff" type="square-loader" [fullScreen]="false">
                            <p style="color: white"> Loading... </p>
                        </ngx-spinner>
                        <table class="table table-hover compact">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Test Name</th>
                                    <th>Test Code</th>
                                    <!-- <th>Action</th> -->
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="4" *ngIf="!testList.length"> 
                                        <div class="alert alert-primary text-center" role="alert">
                                            No test found <i class="fa fa-exclamation-triangle text-light" aria-hidden="true"></i>
                                        </div>
                                    </td>
                                </tr>
                                <tr (click)="getTestMachines(item.TPId,i,item.TestProfileCode)" class="pointer" [class.active]="i == HighlightRow" *ngFor="let item of testList | filterByKey: searchText:['TestProfileName', 'TestProfileCode']; let i = index">
                                    <td>{{i+1}}</td>
                                    <td>{{item.TestProfileName}}</td>
                                    <td>{{item.TestProfileCode}}</td>
                                    <!-- <td>
                                        <a (click)="getTestMachines(item.TPId)" class="cursor-pointer" style="font-size: 17px;"  ngbTooltip="View Detail"> 
                                            <i class="fa fa-eye text-primary"></i>
                                        </a>
                                    </td> -->
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </app-card>
        </div>
        <div class="col-xs-12 col-sm-12 col-md-6 col-lg-6 col-xl-6">
            <app-card [title]="'Set Machine Priority for -[   ' + TestProfileCode +'   ]'" [cardClass]="'tim-card tim-card tim-card-primary'">
                <div class="card-body">
                    <div class="table-responsive fixed-height-table">
                        <ngx-spinner class="spinner-info" bdColor="rgba(0,0,0,0.8)" [name]="spinnerRefs.machinePriorityFormSection" size="medium" color="#fff" type="square-loader" [fullScreen]="false">
                            <p style="color: white"> Loading... </p>
                        </ngx-spinner>
                        <div class="table-responsive">
                            <table class="table" *ngIf="TestMachineList.length; else NoRec">
                                <thead>
                                    <tr>
                                        <th scope="col" class="col-md"><i class="fa fa-sort text-bar-heading " aria-hidden="true"></i></th>
                                        <th scope="col" class="col-md">Machine Name</th>
                                        <th scope="col" class="col-md">Machine Code</th>
                                        <th scope="col" class="col-md">Priority</th>
                                    </tr>
                                </thead>
                                <tbody cdkDropList (cdkDropListDropped)="onDrop($event)">
                                    <tr *ngFor="let item of TestMachineList; let i = index" cdkDrag cdkDragLockAxis="y">
                                        <th class="col-md">
                                            <div class="drag-handle">
                                                <!-- <ng-container [ngTemplateOutlet]="dragHandleTmpl">
                                                </ng-container> -->
                                                <i class="fa fa-bars text-bar" aria-hidden="true"></i>
                                            </div>
                                        </th>
                                        <td class="col-md">{{ item.MachineName }}</td>
                                        <td class="col-md">{{ item.MachineCode }}</td>
                                        <td class="col-md">
                                            <span class="badge badge-pill badge-inverse-success">{{item.MachinePriority}}</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <ng-template #NoRec>
                                <table class="table" *ngIf="!TestMachineList.length">
                                    <tbody>
                                        <tr>
                                            <td colspan="4"> 
                                                <div class="alert alert-primary text-center" role="alert">
                                                    No associated machine found for " {{TestProfileCode}} " <i class="fa fa-exclamation-triangle text-light" aria-hidden="true"></i>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </ng-template>
                        </div>
                        <hr>
                    </div>
                    <div class="row" *ngIf="TestMachineList.length">
                        <div class="col-12 mt-3">
                            <button
                                [disabled]="disabledButton"
                                class="btn btn-sm btn-primary pull-right"
                                title=""
                                mwlConfirmationPopover
                                [popoverTitle]="confirmationPopoverConfig.popoverTitleTests"
                                [popoverMessage]="confirmationPopoverConfig.popoverMessage"
                                [confirmText]="confirmationPopoverConfig.confirmText"
                                [cancelText]="confirmationPopoverConfig.cancelText"
                                [placement]="confirmationPopoverConfig.placements[0]"
                                (confirm)="updateTestMachinePriority()"
                                (cancel)="confirmationPopoverConfig.confirmPopoverCancel()"
                                confirmButtonType="btn btn-sm btn-primary"
                                cancelButtonType="btn btn-sm btn-outline-secondary"
                                (click)="confirmationPopoverConfig.confirmClicked = false; confirmationPopoverConfig.cancelClicked = false"
                                [appendToBody]="true">
                                <i 
                                [ngClass]="'fa fa-save'"
                                ></i>Save<i class="spinner-border-custom" aria-hidden="true" [hidden]="isSpinner" ></i>
                            </button>
                        </div>
                    </div>
                </div>
            </app-card>
        </div>
    </div>
</div>
